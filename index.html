<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#090314">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>小時候打卡系統-國華</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --bg-0: #07020f;
      --bg-1: #110827;
      --bg-2: #211044;
      --glass: rgba(255, 255, 255, 0.105);
      --glass-strong: rgba(255, 255, 255, 0.16);
      --glass-soft: rgba(255, 255, 255, 0.075);
      --stroke: rgba(255, 255, 255, 0.22);
      --stroke-strong: rgba(255, 255, 255, 0.38);
      --text: #fbf7ff;
      --muted: rgba(244, 232, 255, 0.72);
      --faint: rgba(244, 232, 255, 0.54);
      --purple: #9b5cff;
      --purple-2: #6e37ff;
      --pink: #ff4fd8;
      --cyan: #65e7ff;
      --green: #6dffb2;
      --amber: #ffd56a;
      --danger: #ff5177;
      --radius-xl: 30px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --shadow-deep: 0 34px 90px rgba(0, 0, 0, 0.55);
      --shadow-glow: 0 0 44px rgba(155, 92, 255, 0.32);
      --inner-glass: inset 0 1px 0 rgba(255,255,255,0.58), inset 0 -18px 30px rgba(16, 5, 38, 0.35);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      min-height: 100%;
      color-scheme: dark;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 16% 6%, rgba(255, 79, 216, 0.34) 0, rgba(255, 79, 216, 0.05) 29%, transparent 46%),
        radial-gradient(circle at 88% 12%, rgba(101, 231, 255, 0.25) 0, rgba(101, 231, 255, 0.06) 28%, transparent 48%),
        radial-gradient(circle at 70% 86%, rgba(110, 55, 255, 0.5) 0, rgba(110, 55, 255, 0.08) 35%, transparent 56%),
        linear-gradient(145deg, #05020a 0%, #10051f 38%, #18072f 64%, #05020b 100%);
      background-attachment: fixed;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      pointer-events: none;
      z-index: -2;
    }

    body::before {
      inset: 0;
      background:
        linear-gradient(115deg, transparent 0 16%, rgba(255,255,255,0.085) 17%, transparent 19% 46%, rgba(255,255,255,0.05) 47%, transparent 49% 100%),
        repeating-linear-gradient(135deg, rgba(255,255,255,0.032) 0 1px, transparent 1px 18px);
      mask-image: radial-gradient(circle at center, black 0%, black 72%, transparent 100%);
      opacity: 0.64;
    }

    body::after {
      width: 310px;
      height: 310px;
      right: -140px;
      top: 110px;
      border-radius: 42% 58% 52% 48%;
      background: radial-gradient(circle at 34% 28%, rgba(255,255,255,0.55), rgba(255,79,216,0.22) 30%, rgba(110,55,255,0.12) 56%, transparent 72%);
      filter: blur(8px);
      opacity: 0.74;
      transform: rotate(-18deg);
    }

    .wrap {
      position: relative;
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 22px 16px 26px;
    }

    .wrap::before,
    .wrap::after {
      content: "";
      position: absolute;
      pointer-events: none;
      border-radius: 999px;
      z-index: -1;
      filter: blur(2px);
    }

    .wrap::before {
      width: 210px;
      height: 210px;
      left: -88px;
      top: 74px;
      background: radial-gradient(circle at 36% 32%, rgba(255,255,255,0.7), rgba(155,92,255,0.28) 28%, rgba(255,79,216,0.08) 58%, transparent 74%);
      opacity: 0.78;
    }

    .wrap::after {
      width: 145px;
      height: 145px;
      right: -48px;
      bottom: 56px;
      background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.64), rgba(101,231,255,0.28) 33%, rgba(110,55,255,0.09) 62%, transparent 78%);
      opacity: 0.72;
    }

    .header {
      position: relative;
      text-align: center;
      padding: 18px 8px 18px;
    }

    .header::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 10px;
      width: 118px;
      height: 5px;
      transform: translateX(-50%);
      border-radius: 99px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.88), transparent);
      box-shadow: 0 0 24px rgba(255,255,255,0.55), 0 0 34px rgba(255,79,216,0.35);
      opacity: 0.86;
    }

    .brand {
      font-size: clamp(27px, 7.4vw, 36px);
      font-weight: 950;
      letter-spacing: 2px;
      line-height: 1.18;
      margin: 12px 0 7px;
      color: #fff;
      text-shadow:
        0 1px 0 rgba(255,255,255,0.72),
        0 0 18px rgba(155,92,255,0.75),
        0 14px 34px rgba(0,0,0,0.55);
    }

    .subtitle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      padding: 7px 13px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.7px;
      color: rgba(255,255,255,0.74);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(20px) saturate(150%);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.34), 0 12px 32px rgba(0,0,0,0.22);
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-xl);
      padding: 18px;
      margin-bottom: 16px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.18), rgba(255,255,255,0.072) 42%, rgba(255,255,255,0.105)),
        radial-gradient(circle at 22% 0%, rgba(255,255,255,0.27), transparent 28%),
        rgba(28, 12, 56, 0.48);
      border: 1px solid var(--stroke);
      backdrop-filter: blur(28px) saturate(172%);
      -webkit-backdrop-filter: blur(28px) saturate(172%);
      box-shadow:
        var(--shadow-deep),
        var(--shadow-glow),
        var(--inner-glass),
        13px 18px 0 rgba(0,0,0,0.16);
      transform: perspective(1100px) rotateX(0.42deg) rotateY(-0.22deg);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: calc(var(--radius-xl) - 1px);
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.48), transparent 24%, transparent 72%, rgba(255,255,255,0.14)),
        linear-gradient(180deg, rgba(255,255,255,0.18), transparent 18% 72%, rgba(0,0,0,0.18));
      opacity: 0.78;
      mix-blend-mode: screen;
    }

    .card::after {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      top: 11px;
      height: 2px;
      border-radius: 999px;
      pointer-events: none;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.86), transparent);
      box-shadow: 0 0 18px rgba(255,255,255,0.48);
      opacity: 0.72;
    }

    .status {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      padding: 18px;
      margin-bottom: 16px;
      min-height: 96px;
      font-size: 15px;
      line-height: 1.85;
      white-space: pre-line;
      word-break: break-word;
      color: rgba(255,255,255,0.91);
      background:
        linear-gradient(150deg, rgba(255,255,255,0.14), rgba(255,255,255,0.055)),
        rgba(10, 3, 24, 0.28);
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(22px) saturate(150%);
      -webkit-backdrop-filter: blur(22px) saturate(150%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.38),
        inset 0 -18px 30px rgba(0,0,0,0.18),
        0 18px 44px rgba(0,0,0,0.28);
    }

    .status::before {
      content: "";
      position: absolute;
      left: 14px;
      right: 14px;
      top: 10px;
      height: 2px;
      border-radius: 99px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.56), transparent);
      opacity: 0.68;
      pointer-events: none;
    }

    .sending-status {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      padding: 21px;
      margin-bottom: 0;
      color: #fff;
      text-align: left;
      background:
        radial-gradient(circle at 24% 12%, rgba(255,255,255,0.34), transparent 26%),
        linear-gradient(145deg, rgba(155,92,255,0.34), rgba(255,79,216,0.14) 42%, rgba(101,231,255,0.13));
      border: 1px solid rgba(255,255,255,0.24);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.52), inset 0 -18px 30px rgba(15,3,36,0.36), 0 18px 46px rgba(0,0,0,0.34);
    }

    .sending-status::before {
      content: "";
      position: absolute;
      inset: 9px 16px auto 16px;
      height: 3px;
      border-radius: 99px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.92), transparent);
      opacity: 0.72;
    }

    .sending-title {
      font-size: 22px;
      font-weight: 900;
      line-height: 1.55;
      margin: 8px 0 4px;
      color: rgba(255,255,255,0.86);
    }

    .sending-action {
      font-size: 26px;
      font-weight: 950;
      line-height: 1.45;
      color: #fff;
      text-shadow: 0 0 18px rgba(255,79,216,0.74), 0 10px 24px rgba(0,0,0,0.4);
    }

    .sending-blink {
      animation: sendingBlink 0.5s infinite;
    }

    @keyframes sendingBlink {
      0%, 100% { opacity: 1; filter: brightness(1.15); }
      50% { opacity: 0.32; filter: brightness(0.92); }
    }

    .section-title,
    .mini-title {
      position: relative;
      font-size: 14px;
      font-weight: 950;
      color: rgba(255,255,255,0.88);
      margin: 13px 2px 9px;
      letter-spacing: 0.6px;
      text-align: left;
      text-shadow: 0 0 12px rgba(155,92,255,0.3);
    }

    .section-title::before,
    .mini-title::before {
      content: "";
      display: inline-block;
      width: 8px;
      height: 8px;
      margin-right: 8px;
      border-radius: 999px;
      vertical-align: 1px;
      background: radial-gradient(circle at 30% 24%, #fff, var(--pink) 38%, var(--purple-2) 76%);
      box-shadow: 0 0 14px rgba(255,79,216,0.75);
    }

    input,
    select,
    textarea {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      display: block;
      padding: 15px 16px;
      margin-bottom: 11px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.18);
      outline: none;
      color: #fff;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.13), rgba(255,255,255,0.055)),
        rgba(11, 4, 28, 0.46);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.32),
        inset 0 -12px 20px rgba(0,0,0,0.22),
        0 12px 28px rgba(0,0,0,0.2);
      font-family: inherit;
      font-size: 16px;
      font-weight: 750;
      backdrop-filter: blur(14px) saturate(145%);
      -webkit-backdrop-filter: blur(14px) saturate(145%);
      transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease, background .18s ease;
      -webkit-appearance: none;
      appearance: none;
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(255,255,255,0.46);
      font-weight: 650;
    }

    select {
      background-image:
        linear-gradient(45deg, transparent 50%, rgba(255,255,255,0.78) 50%),
        linear-gradient(135deg, rgba(255,255,255,0.78) 50%, transparent 50%),
        linear-gradient(145deg, rgba(255,255,255,0.13), rgba(255,255,255,0.055));
      background-position:
        calc(100% - 22px) 50%,
        calc(100% - 15px) 50%,
        0 0;
      background-size: 7px 7px, 7px 7px, 100% 100%;
      background-repeat: no-repeat;
      padding-right: 44px;
    }

    select option {
      color: #211044;
      background: #fbf7ff;
      font-weight: 800;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.65;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(255,255,255,0.46);
      background:
        linear-gradient(145deg, rgba(255,255,255,0.18), rgba(255,255,255,0.078)),
        rgba(18, 7, 43, 0.56);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.48),
        inset 0 -14px 22px rgba(0,0,0,0.24),
        0 0 0 3px rgba(155,92,255,0.22),
        0 16px 34px rgba(0,0,0,0.28),
        0 0 28px rgba(255,79,216,0.18);
      transform: translateY(-1px);
    }

    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(1) brightness(1.6) saturate(1.8);
      opacity: .82;
    }

    .success-card input,
    .success-card select,
    .success-card textarea {
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
    }

    button {
      position: relative;
      overflow: hidden;
      width: 100%;
      min-height: 56px;
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 19px;
      padding: 16px 18px;
      margin: 8px 0;
      font-size: 17px;
      font-weight: 950;
      letter-spacing: 0.5px;
      color: #fff;
      cursor: pointer;
      background:
        radial-gradient(circle at 28% 10%, rgba(255,255,255,0.72), rgba(255,255,255,0.04) 30%),
        linear-gradient(145deg, #c06bff 0%, #7f42ff 42%, #4214bd 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.72),
        inset 0 -18px 22px rgba(35, 8, 102, 0.38),
        0 15px 30px rgba(74, 24, 178, 0.35),
        0 0 26px rgba(155,92,255,0.32);
      text-shadow: 0 1px 1px rgba(0,0,0,0.3), 0 0 12px rgba(255,255,255,0.22);
      transform: translateZ(0);
      transition: transform .14s ease, box-shadow .18s ease, filter .18s ease;
      isolation: isolate;
    }

    button::before {
      content: "";
      position: absolute;
      left: 14px;
      right: 14px;
      top: 8px;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
      opacity: 0.86;
      z-index: -1;
    }

    button::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(125deg, transparent 0%, rgba(255,255,255,0.24) 18%, transparent 34% 100%);
      transform: translateX(-125%);
      transition: transform .45s ease;
      z-index: -1;
    }

    button:hover::after {
      transform: translateX(125%);
    }

    button:active {
      transform: translateY(2px) scale(0.988);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.55),
        inset 0 14px 22px rgba(0,0,0,0.2),
        0 7px 18px rgba(0,0,0,0.28);
    }

    button:disabled {
      cursor: not-allowed;
      filter: grayscale(0.82) brightness(0.78);
      opacity: 0.62;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), 0 8px 20px rgba(0,0,0,0.24) !important;
    }

    .btn-main {
      background:
        radial-gradient(circle at 28% 8%, rgba(255,255,255,0.75), rgba(255,255,255,0.06) 31%),
        linear-gradient(145deg, #d86dff 0%, #934dff 42%, #5220d7 100%);
    }

    .btn-bind,
    .btn-secondary {
      background:
        radial-gradient(circle at 28% 8%, rgba(255,255,255,0.62), rgba(255,255,255,0.045) 31%),
        linear-gradient(145deg, #7f8cff 0%, #6156dd 48%, #312072 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.64), inset 0 -18px 22px rgba(20,11,70,0.36), 0 14px 28px rgba(30,19,80,0.36);
    }

    .btn-outline,
    .record-inactive {
      color: rgba(255,255,255,0.9) !important;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.14), rgba(255,255,255,0.055)),
        rgba(255,255,255,0.07) !important;
      border: 1px solid rgba(255,255,255,0.2) !important;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.36),
        inset 0 -14px 22px rgba(0,0,0,0.18),
        0 13px 26px rgba(0,0,0,0.24) !important;
      backdrop-filter: blur(16px) saturate(150%);
      -webkit-backdrop-filter: blur(16px) saturate(150%);
    }

    .btn-danger {
      background:
        radial-gradient(circle at 28% 8%, rgba(255,255,255,0.72), rgba(255,255,255,0.05) 31%),
        linear-gradient(145deg, #ff7e93 0%, #ff5177 45%, #aa123d 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.64), inset 0 -18px 22px rgba(90,0,28,0.34), 0 15px 28px rgba(255,81,119,0.24);
    }

    .hidden {
      display: none;
    }

    .tips {
      position: relative;
      margin: 10px 2px 0;
      padding: 12px 13px;
      border-radius: 18px;
      font-size: 13px;
      font-weight: 750;
      line-height: 1.6;
      color: rgba(255,255,255,0.68);
      text-align: center;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
    }

    .footer {
      text-align: center;
      font-size: 11px;
      line-height: 1.6;
      color: rgba(255,255,255,0.42);
      margin-top: 14px;
      text-shadow: 0 1px 0 rgba(0,0,0,0.35);
    }

    .success-card {
      position: relative;
      text-align: center;
      padding: 7px 0 2px;
    }

    .success-icon {
      position: relative;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 15px;
      font-size: 50px;
      font-weight: 950;
      color: #07130e;
      background:
        radial-gradient(circle at 30% 22%, #fff 0 13%, rgba(255,255,255,0.62) 14% 23%, transparent 24%),
        radial-gradient(circle at 48% 62%, #6dffb2, #1fd47c 58%, #0b6d49 100%);
      border: 1px solid rgba(255,255,255,0.42);
      box-shadow:
        inset 0 2px 4px rgba(255,255,255,0.92),
        inset 0 -18px 22px rgba(2,52,34,0.34),
        0 18px 48px rgba(40,255,158,0.27),
        0 0 26px rgba(109,255,178,0.28);
      text-shadow: 0 1px 0 rgba(255,255,255,0.7);
    }

    .success-title,
    .status-blocked-title {
      font-size: clamp(23px, 6.4vw, 28px);
      font-weight: 950;
      line-height: 1.25;
      margin: 8px 0 10px;
      letter-spacing: 1px;
      color: #fff;
      text-shadow: 0 0 18px rgba(155,92,255,0.64), 0 12px 30px rgba(0,0,0,0.5);
    }

    .success-time {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 180px;
      margin: 2px auto 16px;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: clamp(34px, 10vw, 44px);
      line-height: 1;
      font-weight: 950;
      letter-spacing: 1.2px;
      color: #fff;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35), inset 0 -14px 22px rgba(0,0,0,0.18), 0 0 30px rgba(101,231,255,0.16);
      text-shadow: 0 0 16px rgba(101,231,255,0.52), 0 8px 24px rgba(0,0,0,0.48);
    }

    .success-list {
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      padding: 14px;
      margin: 14px 0;
      color: #fff;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.13), rgba(255,255,255,0.055)),
        rgba(12, 5, 30, 0.32);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.28),
        inset 0 -16px 28px rgba(0,0,0,0.18),
        0 12px 30px rgba(0,0,0,0.24);
      backdrop-filter: blur(16px) saturate(150%);
      -webkit-backdrop-filter: blur(16px) saturate(150%);
    }

    .success-list::before {
      content: "";
      position: absolute;
      left: 13px;
      right: 13px;
      top: 8px;
      height: 2px;
      border-radius: 99px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.46), transparent);
      opacity: 0.7;
    }

    .success-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid rgba(255,255,255,0.11);
      text-align: left;
    }

    .success-row:last-child {
      border-bottom: none;
    }

    .success-label {
      min-width: 78px;
      color: rgba(244,232,255,0.62);
      font-size: 14px;
      font-weight: 900;
    }

    .success-value {
      flex: 1;
      color: rgba(255,255,255,0.93);
      font-size: 15px;
      font-weight: 900;
      text-align: right;
      word-break: break-word;
      text-shadow: 0 0 12px rgba(255,255,255,0.08);
    }

    .success-note,
    .form-note {
      position: relative;
      overflow: hidden;
      text-align: left;
      font-size: 14px;
      line-height: 1.8;
      color: rgba(255,255,255,0.78);
      background:
        linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.052)),
        rgba(255, 213, 106, 0.08);
      border: 1px solid rgba(255, 213, 106, 0.21);
      border-radius: 18px;
      padding: 13px 14px;
      margin: 12px 0;

      box-shadow: inset 0 1px 0 rgba(255,255,255,0.24), 0 10px 24px rgba(0,0,0,0.18);
    }

    .success-note::before,
    .form-note::before {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      top: 7px;
      height: 2px;
      border-radius: 99px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.36), transparent);
      opacity: 0.58;
    }

    .success-actions {
      margin-top: 14px;
    }

    .records-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;

    .records-tabs button {
      margin: 0;
      padding: 13px 10px;
      min-height: 50px;

    .record-active {

        radial-gradient(circle at 28% 8%, rgba(255,255,255,0.72), rgba(255,255,255,0.05) 31%),
        linear-gradient(145deg, #ff6edf 0%, #934dff 48%, #4020b6 100%) !important;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.65), inset 0 -16px 22px rgba(53,8,102,0.33), 0 14px 28px rgba(155,92,255,0.3) !important;
    }

    .status-blocked {
      text-align: center;
      padding: 7px 0 2px;
    }

    .status-blocked-icon {
      width: 88px;
      height: 88px;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 15px;
      font-size: 56px;
      line-height: 1;
      background:
        radial-gradient(circle at 28% 18%, rgba(255,255,255,0.66), rgba(255,255,255,0.04) 34%),
        linear-gradient(145deg, rgba(255,81,119,0.58), rgba(108,18,58,0.48));
      border: 1px solid rgba(255,255,255,0.24);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.55), inset 0 -18px 24px rgba(65,0,24,0.36), 0 18px 42px rgba(255,81,119,0.18);
    }

    .status-blocked-title {
      color: #fff;
      text-shadow: 0 0 16px rgba(255,81,119,0.7), 0 12px 30px rgba(0,0,0,0.5);
    }

    .status-blocked-message {
      text-align: left;
      font-size: 15px;
      line-height: 1.9;
      white-space: pre-line;
      word-break: break-word;
      color: rgba(255,255,255,0.86);
    }

    .replace-warning-title {
      font-size: clamp(25px, 6.8vw, 30px);
      font-weight: 950;
      color: #fff;
      margin: 6px 0 14px;
      letter-spacing: 1px;
      text-shadow: 0 0 14px rgba(255,81,119,0.9), 0 0 28px rgba(255,79,216,0.52), 0 12px 28px rgba(0,0,0,0.48);
      animation: replaceWarningBlinkV48 0.5s infinite;
    }

    @keyframes replaceWarningBlinkV48 {
      0%, 100% { opacity: 1; filter: brightness(1.22); }
      50% { opacity: 0.32; filter: brightness(0.84); }
    }

    @supports not ((backdrop-filter: blur(20px)) or (-webkit-backdrop-filter: blur(20px))) {
      .card,
      .status,
      .success-list,
      .success-note,
      .form-note,
      input,
      select,
      textarea,
      .btn-outline,
      .record-inactive,
      .subtitle {
        background-color: rgba(31, 13, 61, 0.92) !important;
      }
    }

    @media (max-width: 380px) {
      .wrap {
        padding-left: 12px;
        padding-right: 12px;
      }

      .card {
        padding: 14px;
        border-radius: 26px;
      }

      .status {
        padding: 15px;
        border-radius: 21px;
      }

      .success-row {
        gap: 8px;
      }

      .success-label {
        min-width: 72px;
        font-size: 13px;
      }

      .success-value {
        font-size: 14px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>

<body>
  <div class="wrap">
    <div class="header">
      <div class="brand">小時候打卡系統-國華</div>
      <div class="subtitle">國華測試區・員工上下班・休息紀錄</div>
    </div>

    <div class="card">
      <div id="status" class="status">系統載入中...</div>

      <div id="bindBox" class="hidden">
        <div class="section-title">第一次使用｜綁定員工UID</div>
        <input id="employeeId" type="text" placeholder="請輸入員工UID (電話號碼)">
        <button class="btn-bind" onclick="bindEmployee()">綁定員工資料</button>
      </div>

      <div id="homeBox" class="hidden">
        <div class="section-title">請從 LINE 下方選單操作</div>
        <button class="btn-main" onclick="sendClock('上班打卡')">上班打卡</button>
        <button class="btn-main" onclick="sendClock('下班打卡')">下班打卡</button>
        <button class="btn-main" onclick="sendClock('休息開始')">開始休息</button>
        <button class="btn-main" onclick="sendClock('休息結束')">結束休息</button>
        <button class="btn-outline" onclick="showMakeupPage()">忘記打卡 / 補卡申請</button>
        <button class="btn-outline" onclick="showRecordsHub('month')">打卡紀錄</button>
      </div>

      <div class="tips">
        打卡時會使用手機定位確認是否在分店範圍內
      </div>
    </div>

    <div class="footer">
      LIFF ID：2010240381-aeKasoI4
    </div>
  </div>

  <script>
    const LIFF_ID = '2010240381-aeKasoI4';

    const API_URL = 'https://script.google.com/macros/s/AKfycbwlrdrxOkADLcrXhRyz3GnDqW6ldpd8xF3XUcPTGqZe4J7JyEaNu-Etot_mt_L_Fja2/exec';

    let lineUserId = '';
    let lineDisplayName = '';
    let lastActionType = '';
    let lastBreakFixRowKey = '';

    window.onload = async function () {
      setStatus('正在啟動打卡系統...');

      try {
        if (typeof liff === 'undefined') {
          setStatus('LIFF SDK 載入失敗，請重新開啟 LINE');
          return;
        }

        await liff.init({
          liffId: LIFF_ID,
          withLoginOnExternalBrowser: true
        });

        if (!liff.isLoggedIn()) {
          setStatus('尚未登入 LINE，正在前往登入...');
          liff.login();
          return;
        }

        const profile = await liff.getProfile();

        lineUserId = profile.userId;
        lineDisplayName = profile.displayName;

        handleRoute();

      } catch (err) {
        setStatus(
          '初始化失敗\n\n' +
          '錯誤訊息：' + err.message + '\n\n' +
          '請確認 LIFF Endpoint URL 是否正確'
        );
      }
    };

    function getUrlParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function hideAllBoxes() {
      document.getElementById('bindBox').classList.add('hidden');
      document.getElementById('homeBox').classList.add('hidden');
    }

    function handleRoute() {
      const action = getUrlParam('action');

      hideAllBoxes();

      if (action === 'workIn') {
        sendClock('上班打卡');
        return;
      }

      if (action === 'workOut') {
        sendClock('下班打卡');
        return;
      }

      if (action === 'breakStart') {
        sendClock('休息開始');
        return;
      }

      if (action === 'breakEnd') {
        sendClock('休息結束');
        return;
      }

      // 圖文選單原本「本月紀錄」的連結改成忘記打卡 / 補卡頁面。
      // 舊連結 action=monthRecords 也會直接進入補卡頁面，避免重新設定前就不能用。
      if (action === 'monthRecords' || action === 'makeup' || action === 'forgetClock') {
        showMakeupPage();
        return;
      }

      // 歷史紀錄連結改成「紀錄總覽」：預設本月，頁面內可切換歷史。
      if (action === 'historyRecords' || action === 'records') {
        showRecordsHub('month');
        return;
      }

      document.getElementById('homeBox').classList.remove('hidden');

      setStatus(
        'LINE 身分取得成功\n' +
        'LINE 名稱：' + lineDisplayName + '\n\n' +
        '請從 LINE 下方選單選擇打卡項目'
      );
    }

    function showBindRequired(type) {
      hideAllBoxes();

      lastActionType = type || '';

      document.getElementById('bindBox').classList.remove('hidden');

      setStatus(
        '尚未綁定員工UID\n\n' +
        'LINE 名稱：' + lineDisplayName + '\n\n' +
        '請先輸入員工UID完成綁定。\n' +
        '綁定成功後，請再點一次「' + type + '」。'
      );
    }

    function bindEmployee() {
      const employeeId = document.getElementById('employeeId').value.trim();

      if (!employeeId) {
        setStatus('請先輸入員工UID');
        return;
      }

      if (!lineUserId) {
        setStatus('尚未取得 LINE userId，請重新開啟頁面');
        return;
      }

      setButtons(false);
      setStatus('正在綁定員工資料...');

      apiCall({
        action: 'bindEmployee',
        userId: lineUserId,
        employeeId: employeeId
      }, function (res) {
        setButtons(true);

        if (res.ok) {
          hideAllBoxes();

          document.getElementById('homeBox').classList.remove('hidden');

          setStatus(
            '綁定成功\n\n' +
            '姓名：' + res.name + '\n' +
            '可打卡分店：' + res.allowedStores + '\n\n' +
            '請回 LINE 下方選單，再點一次要執行的打卡項目。'
          );

        } else {
          setStatus(res.message || '綁定失敗');
        }
      });
    }

    function sendClock(type) {
      if (!lineUserId) {
        setStatus('尚未取得 LINE userId，請重新開啟頁面');
        return;
      }

      lastActionType = type;

      hideAllBoxes();

      setButtons(false);
      setStatus(
        'LINE 名稱：' + lineDisplayName + '\n\n' +
        '正在確認員工資料...'
      );

      apiCall({
        action: 'checkEmployee',
        userId: lineUserId
      }, function (preCheck) {
        if (!preCheck.ok && String(preCheck.message || '').includes('尚未綁定')) {
          setButtons(true);
          showBindRequired(type);
          return;
        }

        if (!preCheck.ok) {
          setButtons(true);
          setStatus(preCheck.message || '員工資料檢查失敗');
          return;
        }

        startGeoClock(type);
      });
    }

    function startGeoClock(type) {
      setButtons(false);
      setStatus('正在取得手機定位...\n請允許定位權限');

      if (!navigator.geolocation) {
        setButtons(true);
        setStatus('此手機不支援定位功能');
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function (position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;

          setSendingStatus(type);

          apiCall({
            action: 'clockIn',
            userId: lineUserId,
            type: type,
            lat: lat,
            lng: lng
          }, function (res) {
            setButtons(true);

            if (res.ok) {
              showClockSuccess(res, type);

            } else {
              if (String(res.message || '').includes('尚未綁定')) {
                showBindRequired(type);
              } else {
                setStatus(res.message || '打卡失敗');
              }
            }
          });
        },
        function (error) {
          setButtons(true);

          let msg = '定位失敗';

          if (error.code === 1) {
            msg = '你拒絕了定位權限，無法打卡';
          } else if (error.code === 2) {
            msg = '無法取得目前位置';
          } else if (error.code === 3) {
            msg = '定位逾時，請再試一次';
          }

          setStatus(msg);
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    }

    function showRecordsHub(mode) {
      mode = mode === 'history' ? 'history' : 'month';

      if (!lineUserId) {
        setStatus('尚未取得 LINE userId，請重新開啟頁面');
        return;
      }

      hideAllBoxes();
      setButtons(false);
      renderRecordsLoading(mode);

      apiCall({
        action: mode === 'history' ? 'getHistoryRecords' : 'getMonthRecords',
        userId: lineUserId
      }, function (res) {
        setButtons(true);

        if (!res.ok) {
          setStatus(res.message || '查詢紀錄失敗');
          return;
        }

        renderRecordsPage(mode, res.records || []);
      });
    }

    function renderRecordsLoading(mode) {
      const statusBox = document.getElementById('status');
      statusBox.innerHTML =
        '<div class="records-tabs">' +
          '<button class="' + (mode === 'month' ? 'record-active' : 'record-inactive') + '" onclick="showRecordsHub(\'month\')">本月紀錄</button>' +
          '<button class="' + (mode === 'history' ? 'record-active' : 'record-inactive') + '" onclick="showRecordsHub(\'history\')">歷史紀錄</button>' +
        '</div>' +
        '<div>正在查詢' + (mode === 'history' ? '歷史' : '本月') + '打卡紀錄...</div>';
    }

    function renderRecordsPage(mode, records) {
      const statusBox = document.getElementById('status');
      const title = mode === 'history' ? '歷史打卡紀錄' : '本月打卡紀錄';
      const text = formatGroupedRecordsText(title, records || []);

      statusBox.innerHTML =
        '<div class="records-tabs">' +
          '<button class="' + (mode === 'month' ? 'record-active' : 'record-inactive') + '" onclick="showRecordsHub(\'month\')">本月紀錄</button>' +
          '<button class="' + (mode === 'history' ? 'record-active' : 'record-inactive') + '" onclick="showRecordsHub(\'history\')">歷史紀錄</button>' +
        '</div>' +
        '<div class="status-blocked-message">' + escapeHtml(text) + '</div>';
    }

    function showMakeupPage() {
      if (!lineUserId) {
        setStatus('尚未取得 LINE userId，請重新開啟頁面');
        return;
      }

      hideAllBoxes();
      setButtons(false);
      setStatus('正在確認員工資料...');

      apiCall({
        action: 'checkEmployee',
        userId: lineUserId
      }, function (res) {
        setButtons(true);

        if (!res.ok && String(res.message || '').includes('尚未綁定')) {
          showBindRequired('忘記打卡');
          return;
        }

        if (!res.ok) {
          setStatus(res.message || '員工資料檢查失敗');
          return;
        }

        renderMakeupForm(res);
      });
    }

    function renderMakeupForm(employee) {
      const statusBox = document.getElementById('status');
      const today = getTodaySheetDate();
      const nowTime = getCurrentTimeText();

      statusBox.innerHTML =
        '<div class="success-card">' +
          '<div class="success-title">忘記打卡 / 補卡申請</div>' +
          '<div class="form-note">送出後會進入主管審核。審核通過後才會正式寫入打卡紀錄。</div>' +
          '<div class="mini-title">補卡日期</div>' +
          '<input id="makeupDate" type="date" value="' + escapeHtml(today.replace(/\//g, '-')) + '">' +
          '<div class="mini-title">分店</div>' +
          '<select id="makeupStore"><option value="國華店">國華店</option></select>' +
          '<div class="mini-title">補卡類型</div>' +
          '<select id="makeupType">' +
            '<option value="上班">上班</option>' +
            '<option value="休息開始">休息開始</option>' +
            '<option value="休息結束">休息結束</option>' +
            '<option value="下班">下班</option>' +
          '</select>' +
          '<div class="mini-title">補卡時間</div>' +
          '<input id="makeupTime" type="time" value="' + escapeHtml(nowTime) + '">' +
          '<div class="mini-title">原因</div>' +
          '<textarea id="makeupReason" placeholder="請輸入原因">忘記打卡</textarea>' +
          '<button class="btn-main" onclick="submitMakeupRequest()">送出補卡申請</button>' +
          '<button class="btn-secondary" onclick="closeLiffNow()">關閉畫面</button>' +
        '</div>';
    }

    function submitMakeupRequest() {
      const dateInput = document.getElementById('makeupDate');
      const storeInput = document.getElementById('makeupStore');
      const typeInput = document.getElementById('makeupType');
      const timeInput = document.getElementById('makeupTime');
      const reasonInput = document.getElementById('makeupReason');

      const date = dateInput ? String(dateInput.value || '').replace(/-/g, '/') : '';
      const store = storeInput ? storeInput.value : '';
      const type = typeInput ? typeInput.value : '';
      const time = timeInput ? timeInput.value : '';
      const reason = reasonInput ? reasonInput.value.trim() : '';

      if (!date || !store || !type || !time || !reason) {
        setStatus('補卡資料不完整，請確認日期、分店、類型、時間與原因。');
        return;
      }

      setButtons(false);
      setStatus('正在送出補卡申請...');

      apiCall({
        action: 'submitMakeupRequest',
        userId: lineUserId,
        date: date,
        store: store,
        type: type,
        time: time,
        reason: reason
      }, function (res) {
        setButtons(true);

        if (!res.ok) {
          if (String(res.message || '').includes('尚未綁定')) {
            showBindRequired('忘記打卡');
          } else {
            setStatus(res.message || '補卡申請送出失敗');
          }
          return;
        }

        showMakeupSubmitted(res);
      });
    }

    function showMakeupSubmitted(res) {
      const statusBox = document.getElementById('status');

      statusBox.innerHTML =
        '<div class="success-card">' +
          '<div class="success-icon">✓</div>' +
          '<div class="success-title">補卡申請已送出</div>' +
          '<div class="success-list">' +
            makeSuccessRowHtml('姓名', res.name || lineDisplayName || '-') +
            makeSuccessRowHtml('分店', res.store || '-') +
            makeSuccessRowHtml('日期', res.date || '-') +
            makeSuccessRowHtml('類型', res.type || '-') +
            makeSuccessRowHtml('時間', formatTime(res.time || '')) +
            makeSuccessRowHtml('原因', res.reason || '-') +
            makeSuccessRowHtml('狀態', res.status || '待審核') +
          '</div>' +
          '<div class="success-note">補卡申請已送出，請等待主管審核。審核通過後會寫入正式打卡紀錄。</div>' +
          '<button class="btn-secondary" onclick="closeLiffNow()">關閉畫面</button>' +
        '</div>';
    }

    function formatGroupedRecordsText(title, records) {
  records = records || [];

  records = records.filter(function (r) {
    const result = getField(r, ['result', '狀態']);
    return result === '成功' || result === '補卡';
  });

  if (records.length === 0) {
    return title + '\n\n目前沒有紀錄';
  }

  const map = {};
      records.forEach(function (r) {
        const date = getField(r, ['date', '日期']);
        const store = getField(r, ['store', '分店']);
        const type = getField(r, ['type', '類型', '動作']);
        const time = getField(r, ['time', '時間']);
        const result = getField(r, ['result', '狀態']);

        const key = date + '_' + store;

        if (!map[key]) {
          map[key] = {
            date: date,
            store: store,
            workIn: '',
            breakStart: '',
            breakEnd: '',
            workOut: '',
            result: result,
            hours: ''
          };
        }

        if (type === '上班打卡') {
          map[key].workIn = time;
        } else if (type === '休息開始') {
          map[key].breakStart = time;
        } else if (type === '休息結束') {
          map[key].breakEnd = time;
        } else if (type === '下班打卡') {
          map[key].workOut = time;
        }

        if (result) {
          map[key].result = result;
        }
      });

      const days = Object.values(map);

      days.sort(function (a, b) {
        return String(b.date).localeCompare(String(a.date));
      });

const workDaySet = new Set();
let totalHours = 0;

days.forEach(function (d) {
  if (d.workIn || d.workOut) {
    workDaySet.add(String(d.date || '').trim());
  }

  if (d.workIn && d.workOut) {
    d.hours = calcWorkHours(d.workIn, d.workOut, d.breakStart, d.breakEnd);
  } else {
    d.hours = '';
  }

  const h = parseFloat(d.hours);

  if (!isNaN(h)) {
    totalHours += h;
  }
});

const workDays = workDaySet.size;

      let text =
        title + '\n\n' +
        '上班天數：' + workDays + ' 天\n' +
        '總工時：' + formatHour(totalHours) + ' 小時\n\n';

      days.forEach(function (d, index) {
        text +=
          (index + 1) + '. ' + (d.date || '-') + '\n' +
          '分店：' + (d.store || '-') + '\n' +
          '上班打卡：' + formatTime(d.workIn) + '\n' +
          '休息開始：' + formatTime(d.breakStart) + '\n' +
          '休息結束：' + formatTime(d.breakEnd) + '\n' +
          '下班打卡：' + formatTime(d.workOut) + '\n' +
          '工時：' + (d.hours !== '' ? formatHour(d.hours) + ' 小時' : '-') + '\n\n';
      });

      return text.trim();
    }

    function calcWorkHours(workIn, workOut, breakStart, breakEnd) {
      const inMin = roundedTimeToMinutes(workIn);
      const outMin = roundedTimeToMinutes(workOut);

      if (inMin === null || outMin === null) {
        return '';
      }

      let total = outMin - inMin;

      if (total < 0) {
        total += 24 * 60;
      }

      const bsMin = roundedTimeToMinutes(breakStart);
      const beMin = roundedTimeToMinutes(breakEnd);

      if (bsMin !== null && beMin !== null) {
        let breakTotal = beMin - bsMin;

        if (breakTotal < 0) {
          breakTotal += 24 * 60;
        }

        total -= breakTotal;
      }

      if (total < 0) {
        total = 0;
      }

      return Math.round((total / 60) * 100) / 100;
    }

    function roundedTimeToMinutes(timeText) {
      const parsed = parseTimeParts(timeText);

      if (!parsed) {
        return null;
      }

      let h = parsed.h;
      const m = parsed.m;

      let roundedMinute = 0;

      if (m >= 0 && m <= 15) {
        roundedMinute = 0;
      } else if (m >= 16 && m <= 45) {
        roundedMinute = 30;
      } else if (m >= 46 && m <= 59) {
        h += 1;
        roundedMinute = 0;
      }

      return h * 60 + roundedMinute;
    }

    function parseTimeParts(timeText) {
      if (timeText === null || timeText === undefined || timeText === '') {
        return null;
      }

      const s = String(timeText).trim();

      const match = s.match(/(\d{1,2})\s*:\s*(\d{1,2})(?:\s*:\s*(\d{1,2}))?/);

      if (!match) {
        return null;
      }

      const h = parseInt(match[1], 10);
      const m = parseInt(match[2], 10);
      const sec = match[3] !== undefined ? parseInt(match[3], 10) : 0;

      if (isNaN(h) || isNaN(m)) {
        return null;
      }

      return {
        h: h,
        m: m,
        s: isNaN(sec) ? 0 : sec
      };
    }

    function getTodaySheetDate() {
      const d = new Date();
      return d.getFullYear() + '/' + pad2(d.getMonth() + 1) + '/' + pad2(d.getDate());
    }

    function getCurrentTimeText() {
      const d = new Date();
      return pad2(d.getHours()) + ':' + pad2(d.getMinutes());
    }

    function formatTimeWithSeconds(timeText) {
      const parsed = parseTimeParts(timeText);

      if (!parsed) {
        return '-';
      }

      const sec = parsed.s !== undefined && parsed.s !== null ? parsed.s : 0;
      return pad2(parsed.h) + ':' + pad2(parsed.m) + ':' + pad2(sec);
    }

    function formatTime(timeText) {
      const parsed = parseTimeParts(timeText);

      if (!parsed) {
        return '-';
      }

      return pad2(parsed.h) + ':' + pad2(parsed.m);
    }

    function formatHour(value) {
      const num = parseFloat(value || 0);

      if (isNaN(num)) {
        return '0';
      }

      return Number(num.toFixed(2)).toString();
    }

    function getField(obj, keys) {
      for (let i = 0; i < keys.length; i++) {
        if (obj && obj[keys[i]] !== undefined && obj[keys[i]] !== null) {
          return String(obj[keys[i]]).trim();
        }
      }

      return '';
    }

    function pad2(num) {
      return String(num).padStart(2, '0');
    }

    function apiCall(params, callback) {
      const cbName = 'jsonpCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);

      params.callback = cbName;
      params._t = Date.now();

      const query = Object.keys(params)
        .map(function (key) {
          return encodeURIComponent(key) + '=' + encodeURIComponent(params[key]);
        })
        .join('&');

      const script = document.createElement('script');
      script.src = API_URL + '?' + query;

      let timer = setTimeout(function () {
        cleanup();
        setButtons(true);
        setStatus('連線逾時，請檢查網路或 Apps Script 部署權限');
      }, 15000);

      window[cbName] = function (res) {
        cleanup();
        callback(res);
      };

      script.onerror = function () {
        cleanup();
        setButtons(true);
        setStatus(
          '無法連接 Google Apps Script API\n\n' +
          '目前連線網址：\n' +
          script.src + '\n\n' +
          '請確認 GitHub Pages 是否已更新到新版'
        );
      };

      function cleanup() {
        clearTimeout(timer);
        delete window[cbName];

        if (script.parentNode) {
          script.parentNode.removeChild(script);
        }
      }

      document.body.appendChild(script);
    }


    function showClockSuccess(res, type) {
      const statusBox = document.getElementById('status');

      const actionType = String(res.type || type || '打卡').trim();
      const displayTime = formatTimeWithSeconds(res.time || '');
      const displayDate = String(res.date || '').trim();
      const displayStore = String(res.store || '').trim();
      const displayName = String(res.name || lineDisplayName || '').trim();
      const shift = res.shiftRecord || {};

      let noteHtml = '';
      lastBreakFixRowKey = '';

      if (res.autoBreakStart) {
        lastBreakFixRowKey = String(res.rowKey || shift.rowKey || '').trim();

        noteHtml =
          '<div class="success-note">' +
            '系統提醒\n' +
            '偵測到尚未打「休息開始」，系統已自動補上休息開始。\n\n' +
            '休息開始：' + escapeHtml(formatTimeWithSeconds(res.autoBreakStartTime || '')) + '\n' +
            '休息結束：' + escapeHtml(formatTimeWithSeconds(res.breakEndTime || res.time || '')) + '\n\n' +
            '如果實際只休息 30 分鐘，請點下方按鈕送出修正申請。' +
          '</div>' +
          '<button class="btn-main" onclick="requestBreak30FromLiff()">改成休息 30 分鐘</button>';
      } else if (res.message) {
        noteHtml =
          '<div class="success-note">' +
            escapeHtml(String(res.message || '本次打卡已成功記錄。')) +
          '</div>';
      }

      statusBox.innerHTML =
        '<div class="success-card">' +
          '<div class="success-icon">✓</div>' +
          '<div class="success-title">' + escapeHtml(actionType) + '成功</div>' +
          '<div class="success-time">' + escapeHtml(displayTime) + '</div>' +
          '<div class="success-list">' +
            makeSuccessRowHtml('姓名', displayName || '-') +
            makeSuccessRowHtml('分店', displayStore || '-') +
            makeSuccessRowHtml('日期', displayDate || '-') +
          '</div>' +
          '<div class="success-list">' +
            makeSuccessRowHtml('上班打卡', formatTimeWithSeconds(shift.workIn || '')) +
            makeSuccessRowHtml('休息開始', formatTimeWithSeconds(shift.breakStart || '')) +
            makeSuccessRowHtml('休息結束', formatTimeWithSeconds(shift.breakEnd || '')) +
            makeSuccessRowHtml('下班打卡', formatTimeWithSeconds(shift.workOut || '')) +
          '</div>' +
          noteHtml +
          '<div class="success-actions">' +
            '<button class="btn-secondary" onclick="closeLiffNow()">關閉畫面</button>' +
          '</div>' +
        '</div>';
    }


    function requestBreak30FromLiff() {
      if (!lastBreakFixRowKey) {
        setStatus('找不到可修正的休息紀錄，請重新打開打卡畫面。');
        return;
      }

      setButtons(false);
      setStatus('正在送出休息 30 分鐘修正申請...');

      apiCall({
        action: 'requestBreak30',
        userId: lineUserId,
        rowKey: lastBreakFixRowKey
      }, function (res) {
        setButtons(true);

        if (!res.ok) {
          setStatus(res.message || '休息 30 分鐘修正申請失敗');
          return;
        }

        showBreak30Submitted(res);
      });
    }

    function showBreak30Submitted(res) {
      const statusBox = document.getElementById('status');

      statusBox.innerHTML =
        '<div class="success-card">' +
          '<div class="success-icon">✓</div>' +
          '<div class="success-title">休息 30 分鐘修正已送出</div>' +
          '<div class="success-list">' +
            makeSuccessRowHtml('姓名', res.name || lineDisplayName || '-') +
            makeSuccessRowHtml('分店', res.store || '-') +
            makeSuccessRowHtml('日期', res.date || '-') +
            makeSuccessRowHtml('原休息時間', formatTimeWithSeconds(res.oldBreakStart || '') + ' - ' + formatTimeWithSeconds(res.oldBreakEnd || '')) +
            makeSuccessRowHtml('申請修正為', formatTimeWithSeconds(res.newBreakStart || '') + ' - ' + formatTimeWithSeconds(res.newBreakEnd || '')) +
            makeSuccessRowHtml('狀態', res.status || '待審核') +
          '</div>' +
          '<div class="success-note">休息時間修正申請已送出，請等待主管審核。</div>' +
          '<div class="success-actions">' +
            '<button class="btn-secondary" onclick="closeLiffNow()">關閉畫面</button>' +
          '</div>' +
        '</div>';
    }

    function makeSuccessRowHtml(label, value) {
      return (
        '<div class="success-row">' +
          '<div class="success-label">' + escapeHtml(label) + '</div>' +
          '<div class="success-value">' + escapeHtml(value) + '</div>' +
        '</div>'
      );
    }

    function closeLiffNow() {
      try {
        if (typeof liff !== 'undefined' && liff.isInClient()) {
          liff.closeWindow();
          return;
        }
      } catch (err) {
        console.log('LIFF 關閉失敗：', err);
      }

      setStatus('打卡已完成，可以手動關閉此頁面。');
    }


    function setSendingStatus(type) {
      const statusBox = document.getElementById('status');

      statusBox.innerHTML =
        '<div class="sending-status">' +
          '<div class="sending-title">定位成功</div>' +
          '<div class="sending-action sending-blink">正在送出：' + escapeHtml(type) + '</div>' +
        '</div>';
    }

        function setStatus(text) {
      const statusBox = document.getElementById('status');
      const message = String(text || '');

      const isBlocked =
        message.indexOf('已經有紀錄') !== -1 ||
        message.indexOf('系統已阻擋') !== -1 ||
        message.indexOf('避免覆蓋原本資料') !== -1;

      if (isBlocked) {
        statusBox.innerHTML =
          '<div class="status-blocked">' +
            '<div class="status-blocked-icon">❌</div>' +
            '<div class="status-blocked-title">重複打卡已阻擋</div>' +
            '<div class="status-blocked-message">' + escapeHtml(message) + '</div>' +
          '</div>';
        return;
      }

      statusBox.innerText = message;
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function setButtons(enabled) {
      const buttons = document.querySelectorAll('button');

      buttons.forEach(function (btn) {
        btn.disabled = !enabled;
      });
    }

    function closeLiffAfterSuccess() {
      setTimeout(function () {
        try {
          if (typeof liff !== 'undefined' && liff.isInClient()) {
            liff.closeWindow();
          }
        } catch (err) {
          console.log('LIFF 自動關閉失敗：', err);
        }
      }, 1000);
    }
