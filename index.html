<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#090314">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>小時候打卡系統-國華</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --bg: #010006;
      --ink: #f5f0ff;
      --muted: rgba(245, 240, 255, 0.62);
      --soft: rgba(245, 240, 255, 0.38);
      --ghost: rgba(245, 240, 255, 0.18);
      --line: rgba(245, 240, 255, 0.115);
      --line2: rgba(245, 240, 255, 0.22);
      --panel: rgba(7, 3, 15, 0.82);
      --panel2: rgba(14, 7, 28, 0.72);
      --purple: #7a55e7;
      --purple2: #4d2ca8;
      --plum: #3a1038;
      --rose: #b45b92;
      --green: #83d9b2;
      --danger: #d95c7b;
      --shadow: 0 26px 76px rgba(0,0,0,0.78);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      min-height: 100%;
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 13% -8%, rgba(58,16,56,.48), transparent 33%),
        radial-gradient(circle at 90% 4%, rgba(77,44,168,.42), transparent 30%),
        radial-gradient(circle at 48% 112%, rgba(122,85,231,.22), transparent 42%),
        linear-gradient(168deg, #000005 0%, #020009 38%, #070112 70%, #010006 100%);
      background-attachment: fixed;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -2;
      background:
        linear-gradient(125deg, transparent 0 19%, rgba(255,255,255,.04) 19.35%, transparent 20.1% 100%),
        repeating-linear-gradient(90deg, rgba(255,255,255,.022) 0 1px, transparent 1px 48px),
        repeating-linear-gradient(0deg, rgba(255,255,255,.017) 0 1px, transparent 1px 48px);
      mask-image: linear-gradient(to bottom, black 0%, black 68%, transparent 100%);
      opacity: .72;
    }

    body::after {
      content: "ATTENDANCE";
      position: fixed;
      right: -116px;
      top: 120px;
      pointer-events: none;
      z-index: -1;
      color: rgba(255,255,255,.028);
      font-size: 72px;
      font-weight: 950;
      letter-spacing: 12px;
      transform: rotate(90deg);
    }

    .wrap {
      position: relative;
      width: 100%;
      max-width: 452px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 26px 16px 30px;
    }

    .wrap::before {
      content: "";
      position: absolute;
      left: 16px;
      top: 118px;
      bottom: 36px;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(245,240,255,.14), transparent);
      pointer-events: none;
      opacity: .65;
    }

    .header {
      position: relative;
      padding: 16px 2px 20px 18px;
      text-align: left;
    }

    .header::before {
      content: "KUO HUA · TEST AREA";
      display: inline-flex;
      align-items: center;
      height: 25px;
      padding: 0 10px;
      margin-bottom: 13px;
      border-radius: 999px;
      color: rgba(245,240,255,.62);
      background: rgba(255,255,255,.032);
      border: 1px solid var(--line);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 1.8px;
    }

    .header::after {
      content: "打卡手帳";
      position: absolute;
      right: 3px;
      top: 18px;
      color: rgba(245,240,255,.16);
      writing-mode: vertical-rl;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 4px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin: 0 0 10px;
      color: #fff;
    }

    .brand-main {
      font-family: "Noto Serif TC", "Songti TC", "Microsoft JhengHei", serif;
      font-size: clamp(29px, 7.4vw, 37px);
      font-weight: 950;
      line-height: 1.08;
      letter-spacing: 2px;
      text-shadow: 0 18px 42px rgba(0,0,0,.62), 0 0 22px rgba(122,85,231,.25);
    }

    .brand-sub {
      display: inline-flex;
      width: fit-content;
      padding: 5px 9px;
      border-radius: 999px;
      color: rgba(245,240,255,.58);
      background: rgba(255,255,255,.035);
      border: 1px solid rgba(255,255,255,.07);
      font-size: 11px;
      font-weight: 950;
      letter-spacing: 1.4px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .8px;
    }

    .subtitle::before {
      content: "";
      display: inline-block;
      width: 6px;
      height: 6px;
      margin-right: 8px;
      border-radius: 99px;
      background: var(--green);
      box-shadow: 0 0 14px rgba(131,217,178,.55);
      vertical-align: 1px;
    }

    .card {
      position: relative;
      overflow: hidden;
      padding: 16px;
      border-radius: 30px;
      background:
        linear-gradient(150deg, rgba(255,255,255,.072), rgba(255,255,255,.024)),
        var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.075);
      backdrop-filter: blur(26px) saturate(120%);
      -webkit-backdrop-filter: blur(26px) saturate(120%);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 22px;
      pointer-events: none;
      border-top: 1px solid rgba(245,240,255,.12);
      border-left: 1px solid rgba(245,240,255,.075);
      opacity: .75;
    }

    .card::after {
      content: "";
      position: absolute;
      right: -34px;
      top: -34px;
      width: 128px;
      height: 128px;
      border: 1px solid rgba(245,240,255,.06);
      border-radius: 50%;
      pointer-events: none;
    }

    .status {
      position: relative;
      z-index: 1;
      min-height: 108px;
      margin-bottom: 18px;
      padding: 18px 18px 18px 20px;
      border-radius: 24px;
      color: rgba(245,240,255,.84);
      font-size: 14px;
      line-height: 1.9;
      white-space: pre-line;
      word-break: break-word;
      background: rgba(255,255,255,.032);
      border: 1px solid var(--line);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.055), inset 0 -22px 38px rgba(0,0,0,.2);
    }

    .status::before {
      content: "SYSTEM MESSAGE";
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      color: rgba(245,240,255,.33);
      font-size: 10px;
      font-weight: 950;
      letter-spacing: 1.9px;
    }

    .status::after {
      content: "";
      position: absolute;
      left: 20px;
      top: 39px;
      width: 54px;
      height: 1px;
      background: rgba(245,240,255,.24);
      pointer-events: none;
    }

    #homeBox {
      position: relative;
      z-index: 1;
      display: block;
    }

    .section-title,
    .mini-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 17px 2px 10px;
      color: rgba(245,240,255,.76);
      font-size: 13px;
      font-weight: 950;
      letter-spacing: 1.15px;
      text-align: left;
    }

    .section-title::before,
    .mini-title::before {
      content: "";
      width: 22px;
      height: 1px;
      background: rgba(245,240,255,.36);
      flex: 0 0 22px;
    }

    .section-title::after,
    .mini-title::after {
      content: "";
      height: 1px;
      background: linear-gradient(90deg, rgba(245,240,255,.14), transparent);
      flex: 1;
    }

    .action-list {
      position: relative;
      display: grid;
      grid-template-columns: 1fr;
      gap: 11px;
      padding-left: 10px;
    }

    .action-list::before {
      content: "";
      position: absolute;
      left: 0;
      top: 16px;
      bottom: 16px;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(245,240,255,.18), transparent);
    }

    .secondary-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      position: relative;
      width: 100%;
      margin: 8px 0;
      border: 1px solid var(--line);
      border-radius: 22px;
      color: #fff;
      background: rgba(255,255,255,.038);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 14px 32px rgba(0,0,0,.28);
      font-family: inherit;
      cursor: pointer;
      transition: transform .14s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
    }

    button:active {
      transform: translateY(2px) scale(.992);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .52;
      filter: grayscale(.6);
    }

    .btn-main {
      min-height: 86px;
      padding: 14px 14px;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(122,85,231,.18), rgba(180,91,146,.05)),
        rgba(255,255,255,.032);
    }

    .btn-main::before {
      content: "";
      position: absolute;
      left: -10px;
      top: 50%;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(245,240,255,.52);
      box-shadow: 0 0 16px rgba(122,85,231,.42);
      transform: translateY(-50%);
    }

    .btn-main::after {
      content: "";
      position: absolute;
      top: 14px;
      bottom: 14px;
      right: 44px;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(245,240,255,.22), transparent);
    }

    .btn-main:hover,
    .btn-outline:hover {
      border-color: var(--line2);
      background: rgba(255,255,255,.056);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 18px 38px rgba(0,0,0,.34), 0 0 28px rgba(122,85,231,.12);
    }

    .btn-index {
      position: absolute;
      left: 15px;
      top: 14px;
      color: rgba(245,240,255,.34);
      font-size: 11px;
      font-weight: 950;
      letter-spacing: 1.3px;
    }

    .btn-copy {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      padding-left: 42px;
      padding-right: 38px;
      text-align: left;
    }

    .btn-kicker {
      color: rgba(245,240,255,.28);
      font-size: 9px;
      font-weight: 950;
      letter-spacing: 1.45px;
      line-height: 1;
    }

    .btn-title {
      color: rgba(255,255,255,.95);
      font-size: 19px;
      font-weight: 950;
      letter-spacing: .9px;
      line-height: 1.24;
    }

    .btn-desc {
      color: rgba(245,240,255,.43);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .35px;
      line-height: 1.35;
    }

    .btn-arrow {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(245,240,255,.48);
      font-size: 18px;
      font-weight: 300;
    }

    .btn-outline,
    .record-inactive {
      min-height: 58px;
      padding: 14px 10px;
      color: rgba(245,240,255,.78) !important;
      background: rgba(255,255,255,.027) !important;
      border: 1px solid rgba(245,240,255,.105) !important;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05), 0 12px 28px rgba(0,0,0,.22) !important;
      font-size: 14px;
      font-weight: 950;
      letter-spacing: .55px;
    }

    .btn-bind,
    .btn-secondary {
      min-height: 56px;
      padding: 15px 16px;
      color: rgba(245,240,255,.86);
      background: rgba(255,255,255,.048);
      font-size: 15px;
      font-weight: 950;
    }

    .btn-danger {
      color: #fff;
      background: rgba(217,92,123,.16);
      border-color: rgba(217,92,123,.28);
    }

    .hidden {
      display: none !important;
    }

    .tips {
      position: relative;
      z-index: 1;
      margin-top: 14px;
      padding: 12px 14px;
      color: rgba(245,240,255,.36);
      background: rgba(255,255,255,.022);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 20px;
      text-align: center;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.6;
      letter-spacing: .3px;
    }

    .footer {
      margin-top: 14px;
      color: rgba(245,240,255,.24);
      text-align: center;
      font-size: 11px;
      line-height: 1.6;
    }

    input,
    select,
    textarea {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      display: block;
      margin-bottom: 11px;
      padding: 15px 16px;
      border-radius: 18px;
      border: 1px solid var(--line);
      outline: none;
      color: var(--ink);
      background: rgba(255,255,255,.033);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.055);
      font-family: inherit;
      font-size: 16px;
      font-weight: 800;
      -webkit-appearance: none;
      appearance: none;
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(245,240,255,.3);
    }

    select {
      padding-right: 44px;
      background-image:
        linear-gradient(45deg, transparent 50%, rgba(245,240,255,.62) 50%),
        linear-gradient(135deg, rgba(245,240,255,.62) 50%, transparent 50%);
      background-position: calc(100% - 22px) 50%, calc(100% - 15px) 50%;
      background-size: 7px 7px, 7px 7px;
      background-repeat: no-repeat;
      background-color: rgba(255,255,255,.033);
    }

    select option {
      color: #10051d;
      background: #f4efff;
      font-weight: 800;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.65;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(155,124,255,.45);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.07), 0 0 0 3px rgba(122,85,231,.12);
    }

    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(1) brightness(1.3);
      opacity: .7;
    }

    .success-card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 4px 0 2px;
    }

    .success-icon {
      width: 76px;
      height: 76px;
      margin: 0 auto 14px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #05030a;
      font-size: 42px;
      font-weight: 950;
      background: linear-gradient(145deg, rgba(131,217,178,.96), rgba(75,170,126,.8));
      box-shadow: 0 18px 42px rgba(0,0,0,.28), 0 0 26px rgba(131,217,178,.14);
    }

    .success-title,
    .status-blocked-title {
      margin: 8px 0 10px;
      color: #fff;
      font-size: clamp(22px, 6vw, 27px);
      font-weight: 950;
      line-height: 1.28;
      letter-spacing: .7px;
      text-shadow: 0 14px 32px rgba(0,0,0,.52);
    }

    .success-time {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 158px;
      margin: 0 auto 14px;
      padding: 10px 16px;
      border-radius: 999px;
      color: rgba(255,255,255,.92);
      background: rgba(255,255,255,.036);
      border: 1px solid var(--line);
      font-size: clamp(34px, 10vw, 42px);
      line-height: 1;
      font-weight: 950;
      letter-spacing: 1px;
    }

    .success-list {
      position: relative;
      overflow: hidden;
      margin: 13px 0;
      padding: 13px 14px;
      border-radius: 22px;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--line);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
    }

    .success-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,.07);
      text-align: left;
    }

    .success-row:last-child {
      border-bottom: none;
    }

    .success-label {
      min-width: 78px;
      color: rgba(245,240,255,.38);
      font-size: 13px;
      font-weight: 900;
    }

    .success-value {
      flex: 1;
      color: rgba(245,240,255,.85);
      font-size: 14px;
      font-weight: 900;
      text-align: right;
      word-break: break-word;
    }

    .success-note,
    .form-note {
      margin: 12px 0;
      padding: 13px 14px;
      border-radius: 20px;
      color: rgba(245,240,255,.62);
      background: rgba(255,255,255,.026);
      border: 1px solid rgba(255,255,255,.072);
      font-size: 13px;
      line-height: 1.75;
      text-align: left;
      white-space: pre-line;
    }

    .success-actions {
      margin-top: 13px;
    }

    .records-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .records-tabs button {
      min-height: 50px;
      margin: 0;
      padding: 12px;
      font-size: 14px;
    }

    .record-active {
      color: #fff !important;
      background: rgba(122,85,231,.2) !important;
      border-color: rgba(155,124,255,.28) !important;
    }

    .status-blocked {
      text-align: center;
      padding: 4px 0 2px;
    }

    .status-blocked-icon {
      width: 76px;
      height: 76px;
      margin: 0 auto 14px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 48px;
      background: rgba(217,92,123,.16);
      border: 1px solid rgba(217,92,123,.22);
    }

    .status-blocked-message {
      color: rgba(245,240,255,.76);
      font-size: 14px;
      line-height: 1.85;
      text-align: left;
      white-space: pre-line;
      word-break: break-word;
    }

    .sending-status {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      padding: 20px;
      color: #fff;
      text-align: left;
      background: rgba(255,255,255,.032);
      border: 1px solid var(--line);
    }

    .sending-title {
      margin-bottom: 5px;
      color: rgba(245,240,255,.42);
      font-size: 12px;
      font-weight: 950;
      letter-spacing: 1.2px;
    }

    .sending-action {
      color: #fff;
      font-size: 25px;
      font-weight: 950;
      line-height: 1.35;
    }

    .sending-blink {
      animation: sendingBlink .5s infinite;
    }

    @keyframes sendingBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: .35; }
    }

    @media (max-width: 380px) {
      .wrap { padding: 20px 12px 24px; }
      .wrap::before { left: 12px; }
      .header { padding-left: 16px; }
      .card { padding: 14px; border-radius: 28px; }
      .btn-title { font-size: 18px; }
      .secondary-actions { gap: 8px; }
      .btn-outline { font-size: 13px; }
      .success-label { min-width: 72px; }
    }
  </style>



</head>

<body>
  <div class="wrap">
    <div class="header">
      <div class="brand"><span class="brand-main">小時候打卡系統</span><span class="brand-sub">國華測試區</span></div>
      <div class="subtitle">國華測試區・深夜打卡手帳</div>
    </div>

    <div class="card">
      <div id="status" class="status">系統載入中...</div>

      <div id="bindBox" class="hidden">
        <div class="section-title">第一次使用｜綁定員工UID</div>
        <input id="employeeId" type="text" placeholder="請輸入員工UID (電話號碼)">
        <button class="btn-bind" onclick="bindEmployee()">綁定員工資料</button>
      </div>

      <div id="homeBox" class="hidden">
        <div class="section-title">今日打卡</div>
        <div class="action-list">
          <button class="btn-main punch-work-in" onclick="sendClock('上班打卡')">
            <span class="btn-index">01</span>
            <span class="btn-copy"><span class="btn-kicker">START SHIFT</span><span class="btn-title">上班打卡</span><span class="btn-desc">開始今日班別</span></span>
            <span class="btn-arrow">→</span>
          </button>
          <button class="btn-main punch-break-start" onclick="sendClock('休息開始')">
            <span class="btn-index">02</span>
            <span class="btn-copy"><span class="btn-kicker">BREAK OUT</span><span class="btn-title">開始休息</span><span class="btn-desc">紀錄休息開始時間</span></span>
            <span class="btn-arrow">→</span>
          </button>
          <button class="btn-main punch-break-end" onclick="sendClock('休息結束')">
            <span class="btn-index">03</span>
            <span class="btn-copy"><span class="btn-kicker">BACK TO WORK</span><span class="btn-title">結束休息</span><span class="btn-desc">回到工作狀態</span></span>
            <span class="btn-arrow">→</span>
          </button>
          <button class="btn-main punch-work-out" onclick="sendClock('下班打卡')">
            <span class="btn-index">04</span>
            <span class="btn-copy"><span class="btn-kicker">END SHIFT</span><span class="btn-title">下班打卡</span><span class="btn-desc">完成今日紀錄</span></span>
            <span class="btn-arrow">→</span>
          </button>
        </div>
        <div class="section-title">申請與紀錄</div>
        <div class="secondary-actions">
          <button class="btn-outline" onclick="showMakeupPage()">補卡申請</button>
          <button class="btn-outline" onclick="showRecordsHub('month')">打卡紀錄</button>
        </div>
      </div>

      <div class="tips">
        打卡時會使用手機定位確認是否在分店範圍內
      </div>
    </div>

    <div class="footer">
      LIFF ID：2010240381-aeKasoI4
    </div>
  </div>

  <script>
    const LIFF_ID = '2010240381-aeKasoI4';

    const API_URL = 'https://script.google.com/macros/s/AKfycbwlrdrxOkADLcrXhRyz3GnDqW6ldpd8xF3XUcPTGqZe4J7JyEaNu-Etot_mt_L_Fja2/exec';

    let lineUserId = '';
    let lineDisplayName = '';
    let lastActionType = '';
    let lastBreakFixRowKey = '';

    window.onload = async function () {
      setStatus('正在啟動打卡系統...');

      try {
        if (typeof liff === 'undefined') {
          setStatus('LIFF SDK 載入失敗，請重新開啟 LINE');
          return;
        }

        await liff.init({
          liffId: LIFF_ID,
          withLoginOnExternalBrowser: true
        });

        if (!liff.isLoggedIn()) {
          setStatus('尚未登入 LINE，正在前往登入...');
          liff.login();
          return;
        }

        const profile = await liff.getProfile();

        lineUserId = profile.userId;
        lineDisplayName = profile.displayName;

        handleRoute();

      } catch (err) {
        setStatus(
          '初始化失敗\n\n' +
          '錯誤訊息：' + err.message + '\n\n' +
          '請確認 LIFF Endpoint URL 是否正確'
        );
      }
    };

    function getUrlParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function hideAllBoxes() {
      document.getElementById('bindBox').classList.add('hidden');
      document.getElementById('homeBox').classList.add('hidden');
    }

    function handleRoute() {
      const action = getUrlParam('action');

      hideAllBoxes();

      if (action === 'workIn') {
        sendClock('上班打卡');
        return;
      }

      if (action === 'workOut') {
        sendClock('下班打卡');
        return;
      }

      if (action === 'breakStart') {
        sendClock('休息開始');
        return;
      }

      if (action === 'breakEnd') {
        sendClock('休息結束');
        return;
      }

      // 圖文選單原本「本月紀錄」的連結改成忘記打卡 / 補卡頁面。
      // 舊連結 action=monthRecords 也會直接進入補卡頁面，避免重新設定前就不能用。
      if (action === 'monthRecords' || action === 'makeup' || action === 'forgetClock') {
        showMakeupPage();
        return;
      }

      // 歷史紀錄連結改成「紀錄總覽」：預設本月，頁面內可切換歷史。
      if (action === 'historyRecords' || action === 'records') {
        showRecordsHub('month');
        return;
      }

      document.getElementById('homeBox').classList.remove('hidden');

      setStatus(
        'LINE 身分取得成功\n' +
        'LINE 名稱：' + lineDisplayName + '\n\n' +
        '請從 LINE 下方選單選擇打卡項目'
      );
    }

    function showBindRequired(type) {
      hideAllBoxes();

      lastActionType = type || '';

      document.getElementById('bindBox').classList.remove('hidden');

      setStatus(
        '尚未綁定員工UID\n\n' +
        'LINE 名稱：' + lineDisplayName + '\n\n' +
        '請先輸入員工UID完成綁定。\n' +
        '綁定成功後，請再點一次「' + type + '」。'
      );
    }

    function bindEmployee() {
      const employeeId = document.getElementById('employeeId').value.trim();

      if (!employeeId) {
        setStatus('請先輸入員工UID');
        return;
      }

      if (!lineUserId) {
        setStatus('尚未取得 LINE userId，請重新開啟頁面');
        return;
      }

      setButtons(false);
      setStatus('正在綁定員工資料...');

      apiCall({
        action: 'bindEmployee',
        userId: lineUserId,
        employeeId: employeeId
      }, function (res) {
        setButtons(true);

        if (res.ok) {
          hideAllBoxes();

          document.getElementById('homeBox').classList.remove('hidden');

          setStatus(
            '綁定成功\n\n' +
            '姓名：' + res.name + '\n' +
            '可打卡分店：' + res.allowedStores + '\n\n' +
            '請回 LINE 下方選單，再點一次要執行的打卡項目。'
          );

        } else {
          setStatus(res.message || '綁定失敗');
        }
      });
    }

    function sendClock(type) {
      if (!lineUserId) {
        setStatus('尚未取得 LINE userId，請重新開啟頁面');
        return;
      }

      lastActionType = type;

      hideAllBoxes();

      setButtons(false);
      setStatus(
        'LINE 名稱：' + lineDisplayName + '\n\n' +
        '正在確認員工資料...'
      );

      apiCall({
        action: 'checkEmployee',
        userId: lineUserId
      }, function (preCheck) {
        if (!preCheck.ok && String(preCheck.message || '').includes('尚未綁定')) {
          setButtons(true);
          showBindRequired(type);
          return;
        }

        if (!preCheck.ok) {
          setButtons(true);
          setStatus(preCheck.message || '員工資料檢查失敗');
          return;
        }

        startGeoClock(type);
      });
    }

    function startGeoClock(type) {
      setButtons(false);
      setStatus('正在取得手機定位...\n請允許定位權限');

      if (!navigator.geolocation) {
        setButtons(true);
        setStatus('此手機不支援定位功能');
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function (position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;

          setSendingStatus(type);

          apiCall({
            action: 'clockIn',
            userId: lineUserId,
            type: type,
            lat: lat,
            lng: lng
          }, function (res) {
            setButtons(true);

            if (res.ok) {
              showClockSuccess(res, type);

            } else {
              if (String(res.message || '').includes('尚未綁定')) {
                showBindRequired(type);
              } else {
                setStatus(res.message || '打卡失敗');
              }
            }
          });
        },
        function (error) {
          setButtons(true);

          let msg = '定位失敗';

          if (error.code === 1) {
            msg = '你拒絕了定位權限，無法打卡';
          } else if (error.code === 2) {
            msg = '無法取得目前位置';
          } else if (error.code === 3) {
            msg = '定位逾時，請再試一次';
          }

          setStatus(msg);
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    }

    function showRecordsHub(mode) {
      mode = mode === 'history' ? 'history' : 'month';

      if (!lineUserId) {
        setStatus('尚未取得 LINE userId，請重新開啟頁面');
        return;
      }

      hideAllBoxes();
      setButtons(false);
      renderRecordsLoading(mode);

      apiCall({
        action: mode === 'history' ? 'getHistoryRecords' : 'getMonthRecords',
        userId: lineUserId
      }, function (res) {
        setButtons(true);

        if (!res.ok) {
          setStatus(res.message || '查詢紀錄失敗');
          return;
        }

        renderRecordsPage(mode, res.records || []);
      });
    }

    function renderRecordsLoading(mode) {
      const statusBox = document.getElementById('status');
      statusBox.innerHTML =
        '<div class="records-tabs">' +
          '<button class="' + (mode === 'month' ? 'record-active' : 'record-inactive') + '" onclick="showRecordsHub(\'month\')">本月紀錄</button>' +
          '<button class="' + (mode === 'history' ? 'record-active' : 'record-inactive') + '" onclick="showRecordsHub(\'history\')">歷史紀錄</button>' +
        '</div>' +
        '<div>正在查詢' + (mode === 'history' ? '歷史' : '本月') + '打卡紀錄...</div>';
    }

    function renderRecordsPage(mode, records) {
      const statusBox = document.getElementById('status');
      const title = mode === 'history' ? '歷史打卡紀錄' : '本月打卡紀錄';
      const text = formatGroupedRecordsText(title, records || []);

      statusBox.innerHTML =
        '<div class="records-tabs">' +
          '<button class="' + (mode === 'month' ? 'record-active' : 'record-inactive') + '" onclick="showRecordsHub(\'month\')">本月紀錄</button>' +
          '<button class="' + (mode === 'history' ? 'record-active' : 'record-inactive') + '" onclick="showRecordsHub(\'history\')">歷史紀錄</button>' +
        '</div>' +
        '<div class="status-blocked-message">' + escapeHtml(text) + '</div>';
    }

    function showMakeupPage() {
      if (!lineUserId) {
        setStatus('尚未取得 LINE userId，請重新開啟頁面');
        return;
      }

      hideAllBoxes();
      setButtons(false);
      setStatus('正在確認員工資料...');

      apiCall({
        action: 'checkEmployee',
        userId: lineUserId
      }, function (res) {
        setButtons(true);

        if (!res.ok && String(res.message || '').includes('尚未綁定')) {
          showBindRequired('忘記打卡');
          return;
        }

        if (!res.ok) {
          setStatus(res.message || '員工資料檢查失敗');
          return;
        }

        renderMakeupForm(res);
      });
    }

    function renderMakeupForm(employee) {
      const statusBox = document.getElementById('status');
      const today = getTodaySheetDate();
      const nowTime = getCurrentTimeText();

      statusBox.innerHTML =
        '<div class="success-card">' +
          '<div class="success-title">忘記打卡 / 補卡申請</div>' +
          '<div class="form-note">送出後會進入主管審核。審核通過後才會正式寫入打卡紀錄。</div>' +
          '<div class="mini-title">補卡日期</div>' +
          '<input id="makeupDate" type="date" value="' + escapeHtml(today.replace(/\//g, '-')) + '">' +
          '<div class="mini-title">分店</div>' +
          '<select id="makeupStore"><option value="國華店">國華店</option></select>' +
          '<div class="mini-title">補卡類型</div>' +
          '<select id="makeupType">' +
            '<option value="上班">上班</option>' +
            '<option value="休息開始">休息開始</option>' +
            '<option value="休息結束">休息結束</option>' +
            '<option value="下班">下班</option>' +
          '</select>' +
          '<div class="mini-title">補卡時間</div>' +
          '<input id="makeupTime" type="time" value="' + escapeHtml(nowTime) + '">' +
          '<div class="mini-title">原因</div>' +
          '<textarea id="makeupReason" placeholder="請輸入原因">忘記打卡</textarea>' +
          '<button class="btn-main" onclick="submitMakeupRequest()">送出補卡申請</button>' +
          '<button class="btn-secondary" onclick="closeLiffNow()">關閉畫面</button>' +
        '</div>';
    }

    function submitMakeupRequest() {
      const dateInput = document.getElementById('makeupDate');
      const storeInput = document.getElementById('makeupStore');
      const typeInput = document.getElementById('makeupType');
      const timeInput = document.getElementById('makeupTime');
      const reasonInput = document.getElementById('makeupReason');

      const date = dateInput ? String(dateInput.value || '').replace(/-/g, '/') : '';
      const store = storeInput ? storeInput.value : '';
      const type = typeInput ? typeInput.value : '';
      const time = timeInput ? timeInput.value : '';
      const reason = reasonInput ? reasonInput.value.trim() : '';

      if (!date || !store || !type || !time || !reason) {
        setStatus('補卡資料不完整，請確認日期、分店、類型、時間與原因。');
        return;
      }

      setButtons(false);
      setStatus('正在送出補卡申請...');

      apiCall({
        action: 'submitMakeupRequest',
        userId: lineUserId,
        date: date,
        store: store,
        type: type,
        time: time,
        reason: reason
      }, function (res) {
        setButtons(true);

        if (!res.ok) {
          if (String(res.message || '').includes('尚未綁定')) {
            showBindRequired('忘記打卡');
          } else {
            setStatus(res.message || '補卡申請送出失敗');
          }
          return;
        }

        showMakeupSubmitted(res);
      });
    }

    function showMakeupSubmitted(res) {
      const statusBox = document.getElementById('status');

      statusBox.innerHTML =
        '<div class="success-card">' +
          '<div class="success-icon">✓</div>' +
          '<div class="success-title">補卡申請已送出</div>' +
          '<div class="success-list">' +
            makeSuccessRowHtml('姓名', res.name || lineDisplayName || '-') +
            makeSuccessRowHtml('分店', res.store || '-') +
            makeSuccessRowHtml('日期', res.date || '-') +
            makeSuccessRowHtml('類型', res.type || '-') +
            makeSuccessRowHtml('時間', formatTime(res.time || '')) +
            makeSuccessRowHtml('原因', res.reason || '-') +
            makeSuccessRowHtml('狀態', res.status || '待審核') +
          '</div>' +
          '<div class="success-note">補卡申請已送出，請等待主管審核。審核通過後會寫入正式打卡紀錄。</div>' +
          '<button class="btn-secondary" onclick="closeLiffNow()">關閉畫面</button>' +
        '</div>';
    }

    function formatGroupedRecordsText(title, records) {
  records = records || [];

  records = records.filter(function (r) {
    const result = getField(r, ['result', '狀態']);
    return result === '成功' || result === '補卡';
  });

  if (records.length === 0) {
    return title + '\n\n目前沒有紀錄';
  }

  const map = {};
      records.forEach(function (r) {
        const date = getField(r, ['date', '日期']);
        const store = getField(r, ['store', '分店']);
        const type = getField(r, ['type', '類型', '動作']);
        const time = getField(r, ['time', '時間']);
        const result = getField(r, ['result', '狀態']);

        const key = date + '_' + store;

        if (!map[key]) {
          map[key] = {
            date: date,
            store: store,
            workIn: '',
            breakStart: '',
            breakEnd: '',
            workOut: '',
            result: result,
            hours: ''
          };
        }

        if (type === '上班打卡') {
          map[key].workIn = time;
        } else if (type === '休息開始') {
          map[key].breakStart = time;
        } else if (type === '休息結束') {
          map[key].breakEnd = time;
        } else if (type === '下班打卡') {
          map[key].workOut = time;
        }

        if (result) {
          map[key].result = result;
        }
      });

      const days = Object.values(map);

      days.sort(function (a, b) {
        return String(b.date).localeCompare(String(a.date));
      });

const workDaySet = new Set();
let totalHours = 0;

days.forEach(function (d) {
  if (d.workIn || d.workOut) {
    workDaySet.add(String(d.date || '').trim());
  }

  if (d.workIn && d.workOut) {
    d.hours = calcWorkHours(d.workIn, d.workOut, d.breakStart, d.breakEnd);
  } else {
    d.hours = '';
  }

  const h = parseFloat(d.hours);

  if (!isNaN(h)) {
    totalHours += h;
  }
});

const workDays = workDaySet.size;

      let text =
        title + '\n\n' +
        '上班天數：' + workDays + ' 天\n' +
        '總工時：' + formatHour(totalHours) + ' 小時\n\n';

      days.forEach(function (d, index) {
        text +=
          (index + 1) + '. ' + (d.date || '-') + '\n' +
          '分店：' + (d.store || '-') + '\n' +
          '上班打卡：' + formatTime(d.workIn) + '\n' +
          '休息開始：' + formatTime(d.breakStart) + '\n' +
          '休息結束：' + formatTime(d.breakEnd) + '\n' +
          '下班打卡：' + formatTime(d.workOut) + '\n' +
          '工時：' + (d.hours !== '' ? formatHour(d.hours) + ' 小時' : '-') + '\n\n';
      });

      return text.trim();
    }

    function calcWorkHours(workIn, workOut, breakStart, breakEnd) {
      const inMin = roundedTimeToMinutes(workIn);
      const outMin = roundedTimeToMinutes(workOut);

      if (inMin === null || outMin === null) {
        return '';
      }

      let total = outMin - inMin;

      if (total < 0) {
        total += 24 * 60;
      }

      const bsMin = roundedTimeToMinutes(breakStart);
      const beMin = roundedTimeToMinutes(breakEnd);

      if (bsMin !== null && beMin !== null) {
        let breakTotal = beMin - bsMin;

        if (breakTotal < 0) {
          breakTotal += 24 * 60;
        }

        total -= breakTotal;
      }

      if (total < 0) {
        total = 0;
      }

      return Math.round((total / 60) * 100) / 100;
    }

    function roundedTimeToMinutes(timeText) {
      const parsed = parseTimeParts(timeText);

      if (!parsed) {
        return null;
      }

      let h = parsed.h;
      const m = parsed.m;

      let roundedMinute = 0;

      if (m >= 0 && m <= 15) {
        roundedMinute = 0;
      } else if (m >= 16 && m <= 45) {
        roundedMinute = 30;
      } else if (m >= 46 && m <= 59) {
        h += 1;
        roundedMinute = 0;
      }

      return h * 60 + roundedMinute;
    }

    function parseTimeParts(timeText) {
      if (timeText === null || timeText === undefined || timeText === '') {
        return null;
      }

      const s = String(timeText).trim();

      const match = s.match(/(\d{1,2})\s*:\s*(\d{1,2})(?:\s*:\s*(\d{1,2}))?/);

      if (!match) {
        return null;
      }

      const h = parseInt(match[1], 10);
      const m = parseInt(match[2], 10);
      const sec = match[3] !== undefined ? parseInt(match[3], 10) : 0;

      if (isNaN(h) || isNaN(m)) {
        return null;
      }

      return {
        h: h,
        m: m,
        s: isNaN(sec) ? 0 : sec
      };
    }

    function getTodaySheetDate() {
      const d = new Date();
      return d.getFullYear() + '/' + pad2(d.getMonth() + 1) + '/' + pad2(d.getDate());
    }

    function getCurrentTimeText() {
      const d = new Date();
      return pad2(d.getHours()) + ':' + pad2(d.getMinutes());
    }

    function formatTimeWithSeconds(timeText) {
      const parsed = parseTimeParts(timeText);

      if (!parsed) {
        return '-';
      }

      const sec = parsed.s !== undefined && parsed.s !== null ? parsed.s : 0;
      return pad2(parsed.h) + ':' + pad2(parsed.m) + ':' + pad2(sec);
    }

    function formatTime(timeText) {
      const parsed = parseTimeParts(timeText);

      if (!parsed) {
        return '-';
      }

      return pad2(parsed.h) + ':' + pad2(parsed.m);
    }

    function formatHour(value) {
      const num = parseFloat(value || 0);

      if (isNaN(num)) {
        return '0';
      }

      return Number(num.toFixed(2)).toString();
    }

    function getField(obj, keys) {
      for (let i = 0; i < keys.length; i++) {
        if (obj && obj[keys[i]] !== undefined && obj[keys[i]] !== null) {
          return String(obj[keys[i]]).trim();
        }
      }

      return '';
    }

    function pad2(num) {
      return String(num).padStart(2, '0');
    }

    function apiCall(params, callback) {
      const cbName = 'jsonpCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);

      params.callback = cbName;
      params._t = Date.now();

      const query = Object.keys(params)
        .map(function (key) {
          return encodeURIComponent(key) + '=' + encodeURIComponent(params[key]);
        })
        .join('&');

      const script = document.createElement('script');
      script.src = API_URL + '?' + query;

      let timer = setTimeout(function () {
        cleanup();
        setButtons(true);
        setStatus('連線逾時，請檢查網路或 Apps Script 部署權限');
      }, 15000);

      window[cbName] = function (res) {
        cleanup();
        callback(res);
      };

      script.onerror = function () {
        cleanup();
        setButtons(true);
        setStatus(
          '無法連接 Google Apps Script API\n\n' +
          '目前連線網址：\n' +
          script.src + '\n\n' +
          '請確認 GitHub Pages 是否已更新到新版'
        );
      };

      function cleanup() {
        clearTimeout(timer);
        delete window[cbName];

        if (script.parentNode) {
          script.parentNode.removeChild(script);
        }
      }

      document.body.appendChild(script);
    }


    function showClockSuccess(res, type) {
      const statusBox = document.getElementById('status');

      const actionType = String(res.type || type || '打卡').trim();
      const displayTime = formatTimeWithSeconds(res.time || '');
      const displayDate = String(res.date || '').trim();
      const displayStore = String(res.store || '').trim();
      const displayName = String(res.name || lineDisplayName || '').trim();
      const shift = res.shiftRecord || {};

      let noteHtml = '';
      lastBreakFixRowKey = '';

      if (res.autoBreakStart) {
        lastBreakFixRowKey = String(res.rowKey || shift.rowKey || '').trim();

        noteHtml =
          '<div class="success-note">' +
            '系統提醒\n' +
            '偵測到尚未打「休息開始」，系統已自動補上休息開始。\n\n' +
            '休息開始：' + escapeHtml(formatTimeWithSeconds(res.autoBreakStartTime || '')) + '\n' +
            '休息結束：' + escapeHtml(formatTimeWithSeconds(res.breakEndTime || res.time || '')) + '\n\n' +
            '如果實際只休息 30 分鐘，請點下方按鈕送出修正申請。' +
          '</div>' +
          '<button class="btn-main" onclick="requestBreak30FromLiff()">改成休息 30 分鐘</button>';
      } else if (res.message) {
        noteHtml =
          '<div class="success-note">' +
            escapeHtml(String(res.message || '本次打卡已成功記錄。')) +
          '</div>';
      }

      statusBox.innerHTML =
        '<div class="success-card">' +
          '<div class="success-icon">✓</div>' +
          '<div class="success-title">' + escapeHtml(actionType) + '成功</div>' +
          '<div class="success-time">' + escapeHtml(displayTime) + '</div>' +
          '<div class="success-list">' +
            makeSuccessRowHtml('姓名', displayName || '-') +
            makeSuccessRowHtml('分店', displayStore || '-') +
            makeSuccessRowHtml('日期', displayDate || '-') +
          '</div>' +
          '<div class="success-list">' +
            makeSuccessRowHtml('上班打卡', formatTimeWithSeconds(shift.workIn || '')) +
            makeSuccessRowHtml('休息開始', formatTimeWithSeconds(shift.breakStart || '')) +
            makeSuccessRowHtml('休息結束', formatTimeWithSeconds(shift.breakEnd || '')) +
            makeSuccessRowHtml('下班打卡', formatTimeWithSeconds(shift.workOut || '')) +
          '</div>' +
          noteHtml +
          '<div class="success-actions">' +
            '<button class="btn-secondary" onclick="closeLiffNow()">關閉畫面</button>' +
          '</div>' +
        '</div>';
    }


    function requestBreak30FromLiff() {
      if (!lastBreakFixRowKey) {
        setStatus('找不到可修正的休息紀錄，請重新打開打卡畫面。');
        return;
      }

      setButtons(false);
      setStatus('正在送出休息 30 分鐘修正申請...');

      apiCall({
        action: 'requestBreak30',
        userId: lineUserId,
        rowKey: lastBreakFixRowKey
      }, function (res) {
        setButtons(true);

        if (!res.ok) {
          setStatus(res.message || '休息 30 分鐘修正申請失敗');
          return;
        }

        showBreak30Submitted(res);
      });
    }

    function showBreak30Submitted(res) {
      const statusBox = document.getElementById('status');

      statusBox.innerHTML =
        '<div class="success-card">' +
          '<div class="success-icon">✓</div>' +
          '<div class="success-title">休息 30 分鐘修正已送出</div>' +
          '<div class="success-list">' +
            makeSuccessRowHtml('姓名', res.name || lineDisplayName || '-') +
            makeSuccessRowHtml('分店', res.store || '-') +
            makeSuccessRowHtml('日期', res.date || '-') +
            makeSuccessRowHtml('原休息時間', formatTimeWithSeconds(res.oldBreakStart || '') + ' - ' + formatTimeWithSeconds(res.oldBreakEnd || '')) +
            makeSuccessRowHtml('申請修正為', formatTimeWithSeconds(res.newBreakStart || '') + ' - ' + formatTimeWithSeconds(res.newBreakEnd || '')) +
            makeSuccessRowHtml('狀態', res.status || '待審核') +
          '</div>' +
          '<div class="success-note">休息時間修正申請已送出，請等待主管審核。</div>' +
          '<div class="success-actions">' +
            '<button class="btn-secondary" onclick="closeLiffNow()">關閉畫面</button>' +
          '</div>' +
        '</div>';
    }

    function makeSuccessRowHtml(label, value) {
      return (
        '<div class="success-row">' +
          '<div class="success-label">' + escapeHtml(label) + '</div>' +
          '<div class="success-value">' + escapeHtml(value) + '</div>' +
        '</div>'
      );
    }

    function closeLiffNow() {
      try {
        if (typeof liff !== 'undefined' && liff.isInClient()) {
          liff.closeWindow();
          return;
        }
      } catch (err) {
        console.log('LIFF 關閉失敗：', err);
      }

      setStatus('打卡已完成，可以手動關閉此頁面。');
    }


    function setSendingStatus(type) {
      const statusBox = document.getElementById('status');

      statusBox.innerHTML =
        '<div class="sending-status">' +
          '<div class="sending-title">定位成功</div>' +
          '<div class="sending-action sending-blink">正在送出：' + escapeHtml(type) + '</div>' +
        '</div>';
    }

        function setStatus(text) {
      const statusBox = document.getElementById('status');
      const message = String(text || '');

      const isBlocked =
        message.indexOf('已經有紀錄') !== -1 ||
        message.indexOf('系統已阻擋') !== -1 ||
        message.indexOf('避免覆蓋原本資料') !== -1;

      if (isBlocked) {
        statusBox.innerHTML =
          '<div class="status-blocked">' +
            '<div class="status-blocked-icon">❌</div>' +
            '<div class="status-blocked-title">重複打卡已阻擋</div>' +
            '<div class="status-blocked-message">' + escapeHtml(message) + '</div>' +
          '</div>';
        return;
      }

      statusBox.innerText = message;
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function setButtons(enabled) {
      const buttons = document.querySelectorAll('button');

      buttons.forEach(function (btn) {
        btn.disabled = !enabled;
      });
    }

    function closeLiffAfterSuccess() {
      setTimeout(function () {
        try {
          if (typeof liff !== 'undefined' && liff.isInClient()) {
            liff.closeWindow();
          }
        } catch (err) {
          console.log('LIFF 自動關閉失敗：', err);
        }
      }, 1000);
    }
  </script>
