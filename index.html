<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#090314">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>小時候打卡系統-國華</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --bg: #05030a;
      --bg2: #0b0616;
      --panel: rgba(18, 12, 32, 0.72);
      --panel2: rgba(28, 18, 50, 0.64);
      --stroke: rgba(255, 255, 255, 0.13);
      --stroke2: rgba(255, 255, 255, 0.24);
      --text: #f7f2ff;
      --muted: rgba(247, 242, 255, 0.68);
      --faint: rgba(247, 242, 255, 0.46);
      --purple: #8b5cf6;
      --purple2: #6d28d9;
      --pink: #ec4899;
      --blue: #60a5fa;
      --green: #34d399;
      --red: #fb7185;
      --amber: #fbbf24;
      --radius: 28px;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.54);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      min-height: 100%;
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 4%, rgba(236, 72, 153, 0.32), transparent 27%),
        radial-gradient(circle at 90% 8%, rgba(96, 165, 250, 0.28), transparent 25%),
        radial-gradient(circle at 50% 95%, rgba(139, 92, 246, 0.42), transparent 42%),
        linear-gradient(160deg, #030207 0%, #090414 42%, #120720 100%);
      background-attachment: fixed;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(to bottom, black 0%, black 58%, transparent 100%);
      opacity: .35;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      left: 50%;
      top: 78px;
      width: min(520px, 92vw);
      height: min(520px, 92vw);
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.24), transparent 68%);
      filter: blur(16px);
      pointer-events: none;
      z-index: -1;
    }

    .wrap {
      width: 100%;
      max-width: 460px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 24px 16px 28px;
    }

    .header {
      position: relative;
      padding: 10px 2px 18px;
      text-align: left;
    }

    .header::before {
      content: "TEST AREA";
      display: inline-flex;
      align-items: center;
      height: 26px;
      padding: 0 10px;
      margin-bottom: 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 1.4px;
      color: rgba(255,255,255,0.82);
      background: linear-gradient(135deg, rgba(236,72,153,.22), rgba(139,92,246,.18));
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), 0 10px 28px rgba(139,92,246,0.18);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .brand {
      margin: 0 0 8px;
      font-size: clamp(29px, 8vw, 36px);
      font-weight: 950;
      line-height: 1.12;
      letter-spacing: 1.4px;
      color: #fff;
      text-shadow: 0 0 24px rgba(139,92,246,.42), 0 18px 36px rgba(0,0,0,.48);
    }

    .subtitle {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .5px;
    }

    .subtitle::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 16px rgba(52,211,153,.8);
    }

    .card {
      position: relative;
      overflow: hidden;
      padding: 16px;
      border-radius: 32px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.045)),
        var(--panel);
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.18);
      backdrop-filter: blur(28px) saturate(145%);
      -webkit-backdrop-filter: blur(28px) saturate(145%);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 0%, rgba(255,255,255,.18), transparent 26%),
        linear-gradient(110deg, transparent 0 18%, rgba(255,255,255,.08) 19%, transparent 33% 100%);
    }

    .status {
      position: relative;
      z-index: 1;
      min-height: 112px;
      margin-bottom: 16px;
      padding: 18px;
      border-radius: 24px;
      color: rgba(255,255,255,.88);
      font-size: 15px;
      line-height: 1.8;
      white-space: pre-line;
      word-break: break-word;
      background:
        linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.045)),
        rgba(7, 4, 16, .48);
      border: 1px solid rgba(255,255,255,.11);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18), inset 0 -18px 36px rgba(0,0,0,.18);
      backdrop-filter: blur(20px) saturate(150%);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
    }

    .status::before {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      top: 10px;
      height: 2px;
      border-radius: 99px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.55), transparent);
      opacity: .5;
    }

    #homeBox {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    #homeBox .section-title {
      grid-column: 1 / -1;
      margin: 2px 0 0;
      padding: 0 2px 2px;
    }

    #homeBox .btn-main,
    #homeBox .btn-outline {
      margin: 0;
    }

    #homeBox .btn-main {
      min-height: 86px;
      padding: 15px 10px 14px;
      border-radius: 26px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-align: center;
      font-size: 16px;
    }

    #homeBox .btn-main .btn-emoji {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 14px;
      background: rgba(255,255,255,.16);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.2);
      font-size: 18px;
    }

    #homeBox .btn-outline {
      min-height: 58px;
      border-radius: 22px;
      font-size: 15px;
    }

    #homeBox .btn-outline:nth-of-type(5),
    #homeBox .btn-outline:nth-of-type(6) {
      grid-column: span 1;
    }

    .section-title,
    .mini-title {
      margin: 13px 0 9px;
      color: rgba(255,255,255,.9);
      font-size: 14px;
      font-weight: 950;
      letter-spacing: .4px;
      text-align: left;
    }

    .section-title::before,
    .mini-title::before {
      content: "";
      display: inline-block;
      width: 7px;
      height: 7px;
      margin-right: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      box-shadow: 0 0 14px rgba(236,72,153,.7);
      vertical-align: 1px;
    }

    input,
    select,
    textarea {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      display: block;
      margin-bottom: 11px;
      padding: 15px 16px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.14);
      outline: none;
      color: #fff;
      background: rgba(255,255,255,.065);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.12), inset 0 -12px 26px rgba(0,0,0,.16);
      font-family: inherit;
      font-size: 16px;
      font-weight: 750;
      -webkit-appearance: none;
      appearance: none;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(255,255,255,.4);
    }

    select {
      padding-right: 44px;
      background-image:
        linear-gradient(45deg, transparent 50%, rgba(255,255,255,.78) 50%),
        linear-gradient(135deg, rgba(255,255,255,.78) 50%, transparent 50%);
      background-position: calc(100% - 22px) 50%, calc(100% - 15px) 50%;
      background-size: 7px 7px, 7px 7px;
      background-repeat: no-repeat;
      background-color: rgba(255,255,255,.065);
    }

    select option {
      color: #160a2b;
      background: #f9f5ff;
      font-weight: 800;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.65;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(139,92,246,.7);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.16), 0 0 0 3px rgba(139,92,246,.2), 0 0 24px rgba(139,92,246,.18);
    }

    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(1) brightness(1.5);
      opacity: .8;
    }

    button {
      position: relative;
      overflow: hidden;
      width: 100%;
      min-height: 56px;
      margin: 8px 0;
      padding: 16px 18px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 20px;
      color: #fff;
      cursor: pointer;
      font-size: 17px;
      font-weight: 950;
      letter-spacing: .4px;
      font-family: inherit;
      background:
        radial-gradient(circle at 28% 8%, rgba(255,255,255,.42), transparent 28%),
        linear-gradient(145deg, #a855f7, #6d28d9 58%, #3b0d85);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.28), inset 0 -18px 26px rgba(28,7,70,.32), 0 16px 34px rgba(80,32,180,.34);
      text-shadow: 0 1px 1px rgba(0,0,0,.32);
      transition: transform .14s ease, filter .18s ease, box-shadow .18s ease;
    }

    button::after {
      content: "";
      position: absolute;
      left: 14px;
      right: 14px;
      top: 8px;
      height: 2px;
      border-radius: 99px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.76), transparent);
      opacity: .7;
      pointer-events: none;
    }

    button:active {
      transform: translateY(2px) scale(.99);
      filter: brightness(.95);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .55;
      filter: grayscale(.7) brightness(.75);
    }

    .btn-main {
      background:
        radial-gradient(circle at 28% 8%, rgba(255,255,255,.45), transparent 28%),
        linear-gradient(145deg, #b05cff, #7c3aed 55%, #4c1d95);
    }

    .btn-bind,
    .btn-secondary {
      background:
        radial-gradient(circle at 28% 8%, rgba(255,255,255,.32), transparent 28%),
        linear-gradient(145deg, #64748b, #475569 58%, #1e293b);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.22), inset 0 -16px 24px rgba(0,0,0,.18), 0 14px 30px rgba(0,0,0,.24);
    }

    .btn-outline,
    .record-inactive {
      color: rgba(255,255,255,.86) !important;
      background: rgba(255,255,255,.07) !important;
      border: 1px solid rgba(255,255,255,.13) !important;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.12), 0 12px 26px rgba(0,0,0,.18) !important;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .btn-danger {
      background: linear-gradient(145deg, #fb7185, #e11d48 58%, #881337);
    }

    .hidden {
      display: none !important;
    }

    .tips {
      position: relative;
      z-index: 1;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 20px;
      color: var(--faint);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.55;
      text-align: center;
      background: rgba(255,255,255,.045);
      border: 1px solid rgba(255,255,255,.08);
    }

    .footer {
      margin-top: 14px;
      text-align: center;
      color: rgba(255,255,255,.32);
      font-size: 11px;
      line-height: 1.6;
    }

    .success-card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 4px 0 2px;
    }

    .success-icon {
      width: 82px;
      height: 82px;
      margin: 2px auto 14px;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #04130e;
      font-size: 46px;
      font-weight: 950;
      background: radial-gradient(circle at 30% 18%, #fff, rgba(255,255,255,.42) 22%, transparent 24%), linear-gradient(145deg, #6ee7b7, #34d399 56%, #047857);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.55), inset 0 -16px 28px rgba(4,120,87,.32), 0 20px 46px rgba(52,211,153,.22);
    }

    .success-title,
    .status-blocked-title {
      margin: 8px 0 10px;
      color: #fff;
      font-size: clamp(22px, 6vw, 27px);
      font-weight: 950;
      line-height: 1.25;
      letter-spacing: .7px;
      text-shadow: 0 0 20px rgba(139,92,246,.36), 0 10px 24px rgba(0,0,0,.36);
    }

    .success-time {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 160px;
      margin: 0 auto 14px;
      padding: 10px 17px;
      border-radius: 999px;
      color: #fff;
      font-size: clamp(34px, 10vw, 42px);
      line-height: 1;
      font-weight: 950;
      letter-spacing: 1px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.11);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.14), 0 0 26px rgba(96,165,250,.12);
    }

    .success-list {
      position: relative;
      overflow: hidden;
      margin: 13px 0;
      padding: 13px 14px;
      border-radius: 22px;
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.1);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.11), 0 12px 26px rgba(0,0,0,.18);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .success-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,.08);
      text-align: left;
    }

    .success-row:last-child {
      border-bottom: none;
    }

    .success-label {
      min-width: 78px;
      color: var(--faint);
      font-size: 13px;
      font-weight: 900;
    }

    .success-value {
      flex: 1;
      color: rgba(255,255,255,.9);
      font-size: 14px;
      font-weight: 900;
      text-align: right;
      word-break: break-word;
    }

    .success-note,
    .form-note {
      position: relative;
      margin: 12px 0;
      padding: 13px 14px;
      border-radius: 20px;
      color: rgba(255,255,255,.72);
      background: rgba(251, 191, 36, .07);
      border: 1px solid rgba(251, 191, 36, .13);
      font-size: 13px;
      line-height: 1.75;
      text-align: left;
      white-space: pre-line;
    }

    .success-actions {
      margin-top: 13px;
    }

    .records-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .records-tabs button {
      min-height: 50px;
      margin: 0;
      padding: 12px;
      font-size: 14px;
    }

    .record-active {
      color: #fff !important;
      background: linear-gradient(145deg, #ec4899, #7c3aed 58%, #4c1d95) !important;
    }

    .status-blocked {
      text-align: center;
      padding: 4px 0 2px;
    }

    .status-blocked-icon {
      width: 82px;
      height: 82px;
      margin: 2px auto 14px;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      background: rgba(251,113,133,.14);
      border: 1px solid rgba(251,113,133,.24);
      box-shadow: 0 18px 44px rgba(251,113,133,.12);
    }

    .status-blocked-title {
      color: #fff;
      text-shadow: 0 0 18px rgba(251,113,133,.48), 0 10px 24px rgba(0,0,0,.36);
    }

    .status-blocked-message {
      color: rgba(255,255,255,.84);
      font-size: 14px;
      line-height: 1.85;
      text-align: left;
      white-space: pre-line;
      word-break: break-word;
    }

    .sending-status {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      padding: 20px;
      color: #fff;
      text-align: left;
      background: linear-gradient(145deg, rgba(139,92,246,.32), rgba(236,72,153,.12)), rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.13);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.2), 0 16px 36px rgba(0,0,0,.24);
    }

    .sending-title {
      margin-bottom: 4px;
      color: rgba(255,255,255,.7);
      font-size: 14px;
      font-weight: 900;
      letter-spacing: .5px;
    }

    .sending-action {
      color: #fff;
      font-size: 25px;
      font-weight: 950;
      line-height: 1.35;
      text-shadow: 0 0 20px rgba(236,72,153,.46);
    }

    .sending-blink {
      animation: sendingBlink .5s infinite;
    }

    @keyframes sendingBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: .32; }
    }

    @media (max-width: 380px) {
      .wrap { padding: 18px 12px 24px; }
      .card { padding: 14px; border-radius: 28px; }
      #homeBox { gap: 10px; }
      #homeBox .btn-main { min-height: 80px; font-size: 15px; }
      .success-label { min-width: 72px; }
    }
  </style>

</head>

<body>
  <div class="wrap">
    <div class="header">
      <div class="brand">小時候打卡系統-國華</div>
      <div class="subtitle">國華測試區・員工上下班・休息紀錄</div>
    </div>

    <div class="card">
      <div id="status" class="status">系統載入中...</div>

      <div id="bindBox" class="hidden">
        <div class="section-title">第一次使用｜綁定員工UID</div>
        <input id="employeeId" type="text" placeholder="請輸入員工UID (電話號碼)">
        <button class="btn-bind" onclick="bindEmployee()">綁定員工資料</button>
      </div>

      <div id="homeBox" class="hidden">
        <div class="section-title">快速打卡</div>
        <button class="btn-main punch-work-in" onclick="sendClock('上班打卡')"><span class="btn-emoji">☀️</span><span>上班打卡</span></button>
        <button class="btn-main punch-work-out" onclick="sendClock('下班打卡')"><span class="btn-emoji">🌙</span><span>下班打卡</span></button>
        <button class="btn-main punch-break-start" onclick="sendClock('休息開始')"><span class="btn-emoji">☕</span><span>開始休息</span></button>
        <button class="btn-main punch-break-end" onclick="sendClock('休息結束')"><span class="btn-emoji">⚡</span><span>結束休息</span></button>
        <button class="btn-outline" onclick="showMakeupPage()">忘記打卡 / 補卡</button>
        <button class="btn-outline" onclick="showRecordsHub('month')">打卡紀錄</button>
      </div>

      <div class="tips">
        打卡時會使用手機定位確認是否在分店範圍內
      </div>
    </div>

    <div class="footer">
      LIFF ID：2010240381-aeKasoI4
    </div>
  </div>

  <script>
    const LIFF_ID = '2010240381-aeKasoI4';

    const API_URL = 'https://script.google.com/macros/s/AKfycbwlrdrxOkADLcrXhRyz3GnDqW6ldpd8xF3XUcPTGqZe4J7JyEaNu-Etot_mt_L_Fja2/exec';

    let lineUserId = '';
    let lineDisplayName = '';
    let lastActionType = '';
    let lastBreakFixRowKey = '';

    window.onload = async function () {
      setStatus('正在啟動打卡系統...');

      try {
        if (typeof liff === 'undefined') {
          setStatus('LIFF SDK 載入失敗，請重新開啟 LINE');
          return;
        }

        await liff.init({
          liffId: LIFF_ID,
          withLoginOnExternalBrowser: true
        });

        if (!liff.isLoggedIn()) {
          setStatus('尚未登入 LINE，正在前往登入...');
          liff.login();
          return;
        }

        const profile = await liff.getProfile();

        lineUserId = profile.userId;
        lineDisplayName = profile.displayName;

        handleRoute();

      } catch (err) {
        setStatus(
          '初始化失敗\n\n' +
          '錯誤訊息：' + err.message + '\n\n' +
          '請確認 LIFF Endpoint URL 是否正確'
        );
      }
    };

    function getUrlParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function hideAllBoxes() {
      document.getElementById('bindBox').classList.add('hidden');
      document.getElementById('homeBox').classList.add('hidden');
    }

    function handleRoute() {
      const action = getUrlParam('action');

      hideAllBoxes();

      if (action === 'workIn') {
        sendClock('上班打卡');
        return;
      }

      if (action === 'workOut') {
        sendClock('下班打卡');
        return;
      }

    function startGeoClock(type) {
      setButtons(false);
      setStatus('正在取得手機定位...\n請允許定位權限');

      if (!navigator.geolocation) {
        setButtons(true);
        setStatus('此手機不支援定位功能');
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function (position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;

          setSendingStatus(type);

          apiCall({
            action: 'clockIn',
            userId: lineUserId,
            type: type,
            lat: lat,
            lng: lng
          }, function (res) {
            setButtons(true);

            if (res.ok) {
              showClockSuccess(res, type);

            } else {
              if (String(res.message || '').includes('尚未綁定')) {
                showBindRequired(type);
              } else {
                setStatus(res.message || '打卡失敗');
              }
            }
          });
        },
        function (error) {
          setButtons(true);

          let msg = '定位失敗';

          if (error.code === 1) {
            msg = '你拒絕了定位權限，無法打卡';
          } else if (error.code === 2) {
            msg = '無法取得目前位置';
          } else if (error.code === 3) {
            msg = '定位逾時，請再試一次';
          }

          setStatus(msg);
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        }
      );
    }

    function formatGroupedRecordsText(title, records) {
  records = records || [];

  records = records.filter(function (r) {
    const result = getField(r, ['result', '狀態']);
    return result === '成功' || result === '補卡';
  });

  if (records.length === 0) {
    return title + '\n\n目前沒有紀錄';
  }

  const map = {};
      records.forEach(function (r) {
        const date = getField(r, ['date', '日期']);
        const store = getField(r, ['store', '分店']);
        const type = getField(r, ['type', '類型', '動作']);
        const time = getField(r, ['time', '時間']);
        const result = getField(r, ['result', '狀態']);

        const key = date + '_' + store;

        if (!map[key]) {
          map[key] = {
            date: date,
            store: store,
            workIn: '',
            breakStart: '',
            breakEnd: '',
            workOut: '',
            result: result,
            hours: ''
          };
        }

        if (type === '上班打卡') {
          map[key].workIn = time;
        } else if (type === '休息開始') {
          map[key].breakStart = time;
        } else if (type === '休息結束') {
          map[key].breakEnd = time;
        } else if (type === '下班打卡') {
          map[key].workOut = time;
        }

        if (result) {
          map[key].result = result;
        }
      });

      const days = Object.values(map);

      days.sort(function (a, b) {
        return String(b.date).localeCompare(String(a.date));
      });

const workDaySet = new Set();
let totalHours = 0;

days.forEach(function (d) {
  if (d.workIn || d.workOut) {
    workDaySet.add(String(d.date || '').trim());
  }

  if (d.workIn && d.workOut) {
    d.hours = calcWorkHours(d.workIn, d.workOut, d.breakStart, d.breakEnd);
  } else {
    d.hours = '';
  }

  const h = parseFloat(d.hours);

  if (!isNaN(h)) {
    totalHours += h;
  }
});

const workDays = workDaySet.size;

      let text =
        title + '\n\n' +
        '上班天數：' + workDays + ' 天\n' +
        '總工時：' + formatHour(totalHours) + ' 小時\n\n';

      days.forEach(function (d, index) {
        text +=
          (index + 1) + '. ' + (d.date || '-') + '\n' +
          '分店：' + (d.store || '-') + '\n' +
          '上班打卡：' + formatTime(d.workIn) + '\n' +
          '休息開始：' + formatTime(d.breakStart) + '\n' +
          '休息結束：' + formatTime(d.breakEnd) + '\n' +
          '下班打卡：' + formatTime(d.workOut) + '\n' +
          '工時：' + (d.hours !== '' ? formatHour(d.hours) + ' 小時' : '-') + '\n\n';
      });

      return text.trim();
    }

    function calcWorkHours(workIn, workOut, breakStart, breakEnd) {
      const inMin = roundedTimeToMinutes(workIn);
      const outMin = roundedTimeToMinutes(workOut);

      if (inMin === null || outMin === null) {
        return '';
      }

      let total = outMin - inMin;

      if (total < 0) {
        total += 24 * 60;
      }

      const bsMin = roundedTimeToMinutes(breakStart);
      const beMin = roundedTimeToMinutes(breakEnd);

      if (bsMin !== null && beMin !== null) {
        let breakTotal = beMin - bsMin;

        if (breakTotal < 0) {
          breakTotal += 24 * 60;
        }

        total -= breakTotal;
      }

      if (total < 0) {
        total = 0;
      }

      return Math.round((total / 60) * 100) / 100;
    }

    function roundedTimeToMinutes(timeText) {
      const parsed = parseTimeParts(timeText);

      if (!parsed) {
        return null;
      }

      let h = parsed.h;
      const m = parsed.m;

      let roundedMinute = 0;

      if (m >= 0 && m <= 15) {
        roundedMinute = 0;
      } else if (m >= 16 && m <= 45) {
        roundedMinute = 30;
      } else if (m >= 46 && m <= 59) {
        h += 1;
        roundedMinute = 0;
      }

      return h * 60 + roundedMinute;
    }

    function parseTimeParts(timeText) {
      if (timeText === null || timeText === undefined || timeText === '') {
        return null;
      }

      const s = String(timeText).trim();

      const match = s.match(/(\d{1,2})\s*:\s*(\d{1,2})(?:\s*:\s*(\d{1,2}))?/);

      if (!match) {
        return null;
      }

      const h = parseInt(match[1], 10);
      const m = parseInt(match[2], 10);
      const sec = match[3] !== undefined ? parseInt(match[3], 10) : 0;

      if (isNaN(h) || isNaN(m)) {
        return null;
      }

      return {
        h: h,
        m: m,
        s: isNaN(sec) ? 0 : sec
      };
    }

    function getTodaySheetDate() {
      const d = new Date();
      return d.getFullYear() + '/' + pad2(d.getMonth() + 1) + '/' + pad2(d.getDate());
    }

    function getCurrentTimeText() {
      const d = new Date();
      return pad2(d.getHours()) + ':' + pad2(d.getMinutes());
    }

    function formatTimeWithSeconds(timeText) {
      const parsed = parseTimeParts(timeText);

      if (!parsed) {
        return '-';
      }

      const sec = parsed.s !== undefined && parsed.s !== null ? parsed.s : 0;
      return pad2(parsed.h) + ':' + pad2(parsed.m) + ':' + pad2(sec);
    }

    function formatTime(timeText) {
      const parsed = parseTimeParts(timeText);

      if (!parsed) {
        return '-';
      }

      return pad2(parsed.h) + ':' + pad2(parsed.m);
    }

    function formatHour(value) {
      const num = parseFloat(value || 0);

      if (isNaN(num)) {
        return '0';
      }

      return Number(num.toFixed(2)).toString();
    }

    function getField(obj, keys) {
      for (let i = 0; i < keys.length; i++) {
        if (obj && obj[keys[i]] !== undefined && obj[keys[i]] !== null) {
          return String(obj[keys[i]]).trim();
        }
      }

      return '';
    }

    function pad2(num) {
      return String(num).padStart(2, '0');
    }

    function apiCall(params, callback) {
      const cbName = 'jsonpCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);

      params.callback = cbName;
      params._t = Date.now();

      const query = Object.keys(params)
        .map(function (key) {
          return encodeURIComponent(key) + '=' + encodeURIComponent(params[key]);
        })
        .join('&');

      const script = document.createElement('script');
      script.src = API_URL + '?' + query;

      let timer = setTimeout(function () {
        cleanup();
        setButtons(true);
        setStatus('連線逾時，請檢查網路或 Apps Script 部署權限');
      }, 15000);

      window[cbName] = function (res) {
        cleanup();
        callback(res);
      };

      script.onerror = function () {
        cleanup();
        setButtons(true);
        setStatus(
          '無法連接 Google Apps Script API\n\n' +
          '目前連線網址：\n' +
          script.src + '\n\n' +
          '請確認 GitHub Pages 是否已更新到新版'
        );
      };

      function cleanup() {
        clearTimeout(timer);
        delete window[cbName];

        if (script.parentNode) {
          script.parentNode.removeChild(script);
        }
      }

      document.body.appendChild(script);
    }

          '<div class="success-note">休息時間修正申請已送出，請等待主管審核。</div>' +
          '<div class="success-actions">' +
            '<button class="btn-secondary" onclick="closeLiffNow()">關閉畫面</button>' +
          '</div>' +
        '</div>';
    }

    function makeSuccessRowHtml(label, value) {
      return (
        '<div class="success-row">' +
          '<div class="success-label">' + escapeHtml(label) + '</div>' +
          '<div class="success-value">' + escapeHtml(value) + '</div>' +
        '</div>'
      );
    }

    function closeLiffNow() {
      try {
        if (typeof liff !== 'undefined' && liff.isInClient()) {
          liff.closeWindow();
          return;
        }
      } catch (err) {
        console.log('LIFF 關閉失敗：', err);
      }

      setStatus('打卡已完成，可以手動關閉此頁面。');
    }


    function setSendingStatus(type) {
      const statusBox = document.getElementById('status');

      statusBox.innerHTML =
        '<div class="sending-status">' +
          '<div class="sending-title">定位成功</div>' +
          '<div class="sending-action sending-blink">正在送出：' + escapeHtml(type) + '</div>' +
        '</div>';
    }

        function setStatus(text) {
      const statusBox = document.getElementById('status');
      const message = String(text || '');

      const isBlocked =
        message.indexOf('已經有紀錄') !== -1 ||
        message.indexOf('系統已阻擋') !== -1 ||
        message.indexOf('避免覆蓋原本資料') !== -1;

      if (isBlocked) {
        statusBox.innerHTML =
          '<div class="status-blocked">' +
            '<div class="status-blocked-icon">❌</div>' +
            '<div class="status-blocked-title">重複打卡已阻擋</div>' +
            '<div class="status-blocked-message">' + escapeHtml(message) + '</div>' +
          '</div>';
        return;
      }

      statusBox.innerText = message;
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function setButtons(enabled) {
      const buttons = document.querySelectorAll('button');

      buttons.forEach(function (btn) {
        btn.disabled = !enabled;
      });
    }

    function closeLiffAfterSuccess() {
      setTimeout(function () {
        try {
          if (typeof liff !== 'undefined' && liff.isInClient()) {
            liff.closeWindow();
          }
        } catch (err) {
          console.log('LIFF 自動關閉失敗：', err);
        }
      }, 1000);
    }
  </script>
